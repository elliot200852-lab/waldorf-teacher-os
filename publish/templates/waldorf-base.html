<!DOCTYPE html>
<html class="spring" lang="zh-TW">
<!--
  TeacherOS 華德福美化文件模板
  來源：Google Stitch 生成的 HTML 經 David 設計規範萃取
  用途：beautify 技能讀取此模板，注入教師 .md 內容，生成精美 HTML
  季節切換：修改 <html class="spring|summer|autumn|winter">
  維護者：David
  建立日期：2026-03-19
-->
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>{{TITLE}}</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "var(--primary)",
        "secondary": "var(--secondary)",
        "accent": "var(--accent)",
        "on-primary": "#ffffff",
        "on-surface": "var(--on-surface)",
        "on-surface-variant": "var(--on-surface-variant)",
        "surface": "var(--bg-wash-1)",
        "surface-container": "var(--bg-wash-2)",
        "surface-container-low": "var(--bg-wash-3)",
        "outline-variant": "var(--outline-variant)",
      },
      fontFamily: {
        "headline": ["Playfair Display", "Noto Serif TC", "Georgia", "serif"],
        "body": ["Plus Jakarta Sans", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "sans-serif"],
        "label": ["Plus Jakarta Sans", "Noto Sans TC", "sans-serif"],
      },
      borderRadius: {
        "DEFAULT": "0.25rem",
        "lg": "0.5rem",
        "xl": "1.5rem",
        "full": "9999px",
      },
    },

}
</script>

<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   四季 CSS 變數系統
   切換方式：<html class="spring|summer|autumn|winter">
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* 春 — 新芽綠 + 紫藤 */
html.spring {
  --primary: #6B7F5E;
  --secondary: #9B7BB0;
  --accent: #D4A574;
  --bg-wash-1: #F0F5EB;
  --bg-wash-2: #E8F0D8;
  --bg-wash-3: #F2E8F5;
  --on-surface: #2A3325;
  --on-surface-variant: #4A5544;
  --outline-variant: #C4D1B8;
  --season-icon: "eco";
  --gradient-body: radial-gradient(circle at top left, #F0F5EB 0%, #E8F0D8 40%, #F2E8F5 100%);
  --gradient-header: linear-gradient(135deg, #6B7F5E 0%, #9B7BB0 100%);
}

/* 夏 — 深翠綠 + 陽光橘 */
html.summer {
  --primary: #4A7C6F;
  --secondary: #C47D3B;
  --accent: #E06B40;
  --bg-wash-1: #FFF8F0;
  --bg-wash-2: #FFE8C8;
  --bg-wash-3: #F0E0D0;
  --on-surface: #1C2A25;
  --on-surface-variant: #3D4A44;
  --outline-variant: #C4D4CC;
  --season-icon: "sunny";
  --gradient-body: radial-gradient(circle at top left, #FFF8F0 0%, #FFE8C8 40%, #F0E0D0 100%);
  --gradient-header: linear-gradient(135deg, #4A7C6F 0%, #C47D3B 100%);
}

/* 秋 — 暖土棕 + 森林綠（Stitch 原始配色） */
html.autumn {
  --primary: #8B6F47;
  --secondary: #5B7553;
  --accent: #C47D3B;
  --bg-wash-1: #FAF6F0;
  --bg-wash-2: #F5E6C8;
  --bg-wash-3: #F0DDD5;
  --on-surface: #1C1C18;
  --on-surface-variant: #4E453B;
  --outline-variant: #D1C4B7;
  --season-icon: "park";
  --gradient-body: radial-gradient(circle at top left, #FAF6F0 0%, #F5E6C8 40%, #F0DDD5 100%);
  --gradient-header: linear-gradient(135deg, #8B6F47 0%, #5B7553 100%);
}

/* 冬 — 靜灰藍 + 枯枝褐 */
html.winter {
  --primary: #5E6B7F;
  --secondary: #7B6B60;
  --accent: #8B7B9B;
  --bg-wash-1: #F0F2F5;
  --bg-wash-2: #E0E5EB;
  --bg-wash-3: #E8E0F0;
  --on-surface: #1C1E22;
  --on-surface-variant: #44484F;
  --outline-variant: #C4C8D0;
  --season-icon: "ac_unit";
  --gradient-body: radial-gradient(circle at top left, #F0F2F5 0%, #E0E5EB 40%, #E8E0F0 100%);
  --gradient-header: linear-gradient(135deg, #5E6B7F 0%, #7B6B60 100%);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   共用樣式（來自 Stitch 原始模板）
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

body {
  background: var(--gradient-body);
  min-height: 100vh;
}

/* 水彩暈染頁首 */
.watercolor-wash-header {
  background: var(--gradient-header);
  mask-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 100 100' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'><path d='M0,0 C20,10 40,-5 60,5 C80,15 100,0 100,0 L100,90 C80,100 60,85 40,95 C20,105 0,90 0,90 Z' fill='black'/></svg>");
  -webkit-mask-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 100 100' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'><path d='M0,0 C20,10 40,-5 60,5 C80,15 100,0 100,0 L100,90 C80,100 60,85 40,95 C20,105 0,90 0,90 Z' fill='black'/></svg>");
  mask-size: 100% 100%;
  -webkit-mask-size: 100% 100%;
}

/* 撕邊效果 */
.torn-edge {
  mask-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 100 100' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'><path d='M0,5 L5,2 L10,6 L15,3 L20,7 L25,4 L30,8 L35,5 L40,9 L45,6 L50,10 L55,7 L60,11 L65,8 L70,12 L75,9 L80,13 L85,10 L90,14 L95,11 L100,15 L100,95 L95,92 L90,96 L85,93 L80,97 L75,94 L70,98 L65,95 L60,99 L55,96 L50,100 L45,97 L40,101 L35,98 L30,102 L25,99 L20,103 L15,100 L10,104 L5,101 L0,105 Z' fill='black'/></svg>");
  -webkit-mask-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 100 100' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'><path d='M0,5 L5,2 L10,6 L15,3 L20,7 L25,4 L30,8 L35,5 L40,9 L45,6 L50,10 L55,7 L60,11 L65,8 L70,12 L75,9 L80,13 L85,10 L90,14 L95,11 L100,15 L100,95 L95,92 L90,96 L85,93 L80,97 L75,94 L70,98 L65,95 L60,99 L55,96 L50,100 L45,97 L40,101 L35,98 L30,102 L25,99 L20,103 L15,100 L10,104 L5,101 L0,105 Z' fill='black'/></svg>");
  mask-size: 100% 100%;
  -webkit-mask-size: 100% 100%;
}

/* 手繪風格邊框 */
.hand-drawn-border {
  border: 2px solid var(--primary);
  border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
}

/* 植物浮水印覆蓋層 */
.botanical-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  opacity: 0.06;
  z-index: 50;
  background-repeat: no-repeat;
  background-position: top right;
  background-size: 40%;
}

.material-symbols-outlined {
  font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
}

/* 首字母大寫裝飾 */
.drop-cap::first-letter {
  font-size: 3.5rem;
  font-family: "Playfair Display", "Noto Serif TC", serif;
  float: left;
  margin-right: 0.75rem;
  line-height: 1;
  color: var(--primary);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   列印樣式（@media print）
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

@media print {
  body {
    background: white !important;
    color: #1C1C18 !important;
  }
  .botanical-overlay {
    display: none !important;
  }
  .watercolor-wash-header {
    background: var(--primary) !important;
    mask-image: none !important;
    -webkit-mask-image: none !important;
    border-radius: 0 !important;
  }
  header {
    display: none !important;
  }
  main {
    max-width: 100% !important;
    padding: 0 2rem !important;
  }
  .hand-drawn-border {
    border-radius: 4px !important;
  }
  a {
    text-decoration: none !important;
    color: inherit !important;
  }
  /* 確保分頁不切斷內容區塊 */
  section, .hand-drawn-border, blockquote {
    break-inside: avoid;
  }
}
</style>
</head>

<body class="font-body text-[var(--on-surface)] selection:bg-[var(--secondary)]/20">

<!-- ━━━━━━━━━━ 頁首導航 ━━━━━━━━━━ -->
<header class="sticky top-0 z-40 bg-[var(--bg-wash-1)]/80 backdrop-blur-xl print:hidden">

    <div class="space-y-12">

    </div>

  <!-- ===== 重點框（Highlight Box） ===== -->

<!-- ━━━━━━━━━━ 頁尾 ━━━━━━━━━━ -->

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TeacherOS — 五年級古文明神話 故事規範
# 路徑：publish/config/story-schema.yaml
#
# 用途：
#   1. 供 AI Agent 生成故事時遵守的格式規範（人可讀）
#   2. 供 validate-story.js 讀取驗證數值（機器可讀）
#
# 最後更新：2026-03-28
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

版本: "1.0.0"
適用系列: ancient-myths-grade5

# ══════════════════════════════════════════════════
# 必要檔案清單（7 件套）
# ══════════════════════════════════════════════════
必要檔案:
  - content.md
  - waldorf-teaching.md
  - chalkboard-prompt.md
  - images.md
  - references.md
  - raw-materials.md
  - quality-report.md

# ══════════════════════════════════════════════════
# content.md 規範
# ══════════════════════════════════════════════════
content_md:
  frontmatter:
    必填:
      - aliases     # 供 Obsidian wikilink，格式：["AM0XX 標題"]
      - id          # AM001-AM021 或 TW01-TW04
      - title       # 故事標題（繁體中文），不含課號前綴
      - block       # 區塊識別碼（見 block_允許值）
      - lesson      # 課號數字（整數）
      - age_group   # 固定值："10-11"
      - consciousness  # 施泰納意識階段描述（自由文字，必須存在）

    廢棄欄位:         # 不應出現於新故事，validate 遇到報 WARN
      - lesson_id   # 舊版 id 替代，已被 id 取代
      - story_ref   # Kovacs 原書參照，已被 index.yaml 追蹤取代
      - date        # 建立日期，已被 index.yaml date_created 取代

    id格式: "^(AM\\d{3}|TW\\d{2})$"

    block_允許值:
      - block-1-india
      - block-2-persia
      - block-3-babylon
      - block-4-egypt
      - island-interludes

    age_group固定值: "10-11"

  必要章節:
    - "## 故事本文"
    - "## 事實出處"

  故事本文最低字數: 800

  事實出處:
    最低筆數: 5
    表格格式: "| 事實 | 來源 |"
    來源欄規則: >
      格式為「來源名稱 — 具體條目或頁面」，
      例：「Britannica — Ramayana (Indian epic)」。
      此字串必須與 raw-materials.md 的對應 key 完全一致，
      供 validate-story.js 進行交叉驗證。
      書本引用（含 *斜體書名* 格式）豁免交叉驗證。
    事實欄禁止: "只列關鍵字（如「五兄弟姓名」），必須寫完整描述事實的句子"

# ══════════════════════════════════════════════════
# images.md 規範
# ══════════════════════════════════════════════════
images_md:
  最少圖數: 3

  圖像標準欄位:  # 每個圖像區塊（### 標題）必須包含以下欄位
    必填:
      - 說明          # "- 說明：[圖像用途與教學意圖說明]"
      - 圖片描述      # "- 圖片描述：[中文視覺描述，含風格、年代、內容]"
      - 授權          # "- 授權：[Met Museum CC0 / Wikimedia Commons CC / 公有領域]"
      - 連結          # "- 連結：https://..."（必填，必須以 https:// 開頭）
      - 建議使用時機  # "- 建議使用時機：[故事哪個段落]"

  廢棄欄位:  # 不應出現於新故事，validate 遇到報 WARN
    - "在故事中的角色：（改用「說明：」）"
    - "用途：（改用「說明：」）"
    - "展示時機：（改用「建議使用時機：」）"
    - "URL：（改用「連結：」）"

# ══════════════════════════════════════════════════
# raw-materials.md 規範
# ══════════════════════════════════════════════════
raw_materials_md:
  最低字數: 900
  最少來源筆數: 5
  最少中文來源: 2  # 帶有 [中] 標記的來源

  唯一允許格式: |
    N. **[key]**
       URL: https://...
       [中/英] 描述說明

  key規則: >
    key 必須與 content.md 事實出處表「來源」欄完全一致。
    例：content.md 寫「Britannica — Ramayana (Indian epic)」，
    raw-materials.md 的 key 就必須是「Britannica — Ramayana (Indian epic)」。
    validate-story.js 的交叉驗證以此比對。

  禁止格式:
    - "**名稱** — 來源 — https://...（key 含 em dash，無法與事實出處對齊）"
    - "URL 行前缺少 URL: 標頭（純 URL 無前綴）"

# ══════════════════════════════════════════════════
# references.md 規範
# ══════════════════════════════════════════════════
references_md:
  結構說明: |
    必須包含兩個區塊（中文在前）：
    ## 教師延伸閱讀（中文）
    ## 學術參考（英文）

  每筆格式: "序號. 來源名稱 — 條目標題 — https://url — 類型標籤"
  格式說明: 每筆必須單行，四欄以 em dash 分隔

  類型標籤:
    - 百科
    - 學術
    - 教學
    - 官方

  禁止:
    - 多行描述（每筆必須單行）
    - "URL: 前綴格式（直接寫 https://，不加前綴）"
    - "**粗體** 標題"
    - "[已驗證] 標記"
    - "「圖像來源」「紙本書籍」等額外區塊"

# ══════════════════════════════════════════════════
# chalkboard-prompt.md 規範
# ══════════════════════════════════════════════════
chalkboard_prompt_md:
  必要章節:
    - "## English Prompt"   # Step 3→4 Checkpoint 以此章節存在為判斷依據
    - "## 中文說明（教師版）"

# ══════════════════════════════════════════════════
# waldorf-teaching.md 規範
# ══════════════════════════════════════════════════
waldorf_teaching_md:
  最低字數: 300

  AM0XX必要段落說明: |
    1. 含「教學」「指引」字眼的標題
    2. 含「施泰納」「框架」字眼的標題
    3. 含「台灣」「呼應」字眼的標題

  TW0X特殊說明: |
    TW 系列第二段應為「南島語族教學備註」，
    明確說明施泰納框架不應強加於台灣原住民文化之上。

# ══════════════════════════════════════════════════
# quality-report.md 規範
# ══════════════════════════════════════════════════
quality_report_md:
  說明: 由 Agent 自檢產出，validate-story.js 只驗證檔案存在，不驗證內容格式


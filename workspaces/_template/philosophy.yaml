# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 個人教學哲學覆寫（選用）
# 路徑：workspaces/{teacher_id}/philosophy.yaml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 說明：
#   若填入此檔案，AI 在你的工作階段中會優先讀取這裡的設定，
#   覆蓋 ai-core/teacheros.yaml 中對應的哲學欄位。
#   未填入的欄位自動沿用系統標準版。
#
#   這是選用檔案，不填沒有任何影響。

teacher_identity:
  name: （你的姓名）
  role: 華德福教師                       # 可修改為你的正式職稱

teaching_scope:
  grade_focus:
    - （你的年級，例：四年級）
  subjects:
    - （你的科目，例：台語）

subject_philosophies:
  # 填入你對所教科目的核心理念
  # 格式參考 ai-core/teacheros.yaml 的 subject_philosophies 區塊

communication_preferences:
  response_style:
    - 結構清晰
    - 可直接操作
    # 可加入你的偏好，例如：簡短扼要、多用條列式等

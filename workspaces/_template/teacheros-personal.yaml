# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【個人 TeacherOS 身份與教學哲學】
# 此為老師個人工作空間的身份層，基於 ai-core/teacheros.yaml 進行個性化擴充
# 路徑：workspaces/{teacher_id}/teacheros-personal.yaml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# 【第一部分：教師身份 / Teacher Identity】
# 說明：填入你的基本資料。這將成為 AI 系統對你的第一認識層。

teacher_identity:
  # 中文姓名（例：林美鈴、陳曉文）
  name: 填空

  # 英文 ID（系統識別，例：lin-mei-ling、chen-xiao-wen）
  # 用途：工作空間路由、檔案識別、跨系統整合
  teacher_id: 填空

  # 官方職稱（例：華德福教師、八年級導師、數學科任教師）
  role: 填空

  # 學校背景（選填，例：體制外華德福實驗學校、公立學校、私立雙語學校）
  role_in_ai_era: AI 時代的教師

  # 地理位置（縣市即可，例：台灣台北、新竹縣）
  location: 填空

  # Email（用於系統通知與驗證）
  email: 填空

  # 學校類型（例：體制外華德福、公立學校、私立學校）
  school_type: 填空

  # 學校背景脈絡（說明你所在學校的教學自主性與課程框架）
  school_type_context:
    # 你所在學校的法律／課程框架
    # 體制外學校填：「依實驗教育三法運作」
    # 公立學校填：「受教育部課綱規範」
    legal_framework: 填空

    # 你對課程設計有多少主導權？
    # 例：「教師擁有完整課程自主權」或「需依據教育部課綱」
    curriculum_authority: 填空

    # 你的學生與家長是什麼性質？（選擇你的情況）
    # 例：「家長與學生為主動選擇者」「公立學校學生為入學配置」
    student_community: 填空

    # 這對教師的含義是什麼？
    # 例：「教師本身即課程框架」或「教師須實踐課綱要求」
    teacher_role_implication: 填空

    # 如何定義教學成功？
    # 例：「發展性目標（身心靈整合）」或「達成學習指標與學力檢測」
    success_definition: 填空

# ────────────────────────────────────────────────────────
# 【第二部分：教學範圍 / Teaching Scope】
# 說明：你目前教的年級與科目。可多選。

teaching_scope:
  # 你教的年級（中小學填寫，例：四年級、七到九年級）
  grade_focus:
    - 填空

  # 你教的科目（例：英文、數學、自然、導師課、藝術）
  subjects:
    - 填空

# ────────────────────────────────────────────────────────
# 【第三部分：教學哲學框架 / Pedagogical Framework】
# 說明：華德福教育的核心框架。作為參考與起點，你可根據自己的教學情境調整。
#
# 華德福人智學的四個核心支柱：
# 1. 四體論（Physical / Etheric / Astral / Self）— 理解學生的多層結構
# 2. 七年週期發展論 — 0-7 歲（意志）→ 7-14 歲（感受）→ 14-21 歲（思想）
# 3. 頭心手三元 — 思考（Thinking）、情感（Feeling）、意志（Will）的均衡
# 4. 年級鏡像邏輯 — 學生的意識發展與人類歷史進程的平行性
#
# 如果你不在華德福體系，但欣賞這套框架，可參考其中的概念進行改編。

pedagogical_framework:
  # 你遵循的教育哲學（例：華德福、蒙特梭利、高瞻課程、自主學習、etc）
  philosophy: 填空

  # 你重視學生發展的三個層面（填入你認同的層面）
  developmental_focus:
    - 填空  # 例：思考、情感、意志

  # 你的學習取向（多選，或自訂）
  learning_approach:
    - 填空  # 例：現象學式學習、專案式學習、敘事導向、手工藝實踐

  # 你與學生的長期關係如何？
  long_term_relationship: 填空  # 例：「多年陪伴同一班學生」或「一學年制轉科教師」

# ────────────────────────────────────────────────────────
# 【第四部分：課堂結構 / Lesson Structure】
# 說明：你的典型課堂有什麼節奏？主課程、專科課、其他形式？

lesson_structure:
  # 如果你教主課程（通常華德福中小學才有，時長 1.5-2 小時）
  main_lesson:
    duration_per_session: 填空    # 例：約 2 小時、約 80 分鐘
    schedule: 填空                 # 例：每天固定、一週五天、一週三次
    block_length: 填空             # 例：連續三週、每單元 2-3 週
    total_sessions_per_block: 填空 # 例：約 15 堂、約 12 堂
    # 典型課堂節奏（填入你的實際做法）
    session_rhythm: 填空  # 例：「回顧 → 新課程 → 統整 → 自由表達」或其他
    design_note: 在這裡說明你的主課程特點或教學重點

  # 專科課程（英文、數學、藝術等，通常 45-60 分鐘）
  subject_lesson:
    duration_per_session: 填空    # 例：45 分鐘、60 分鐘
    weekly_frequency: 填空         # 例：一週 2 次、一週 4 次
    total_sessions_per_semester: 填空  # 例：一學期 40 節、80 節
    design_implication: 說明你的專科課程特色

# ────────────────────────────────────────────────────────
# 【第五部分：科目教學哲學 / Subject Philosophies】
# 說明：針對你所教的每一科，寫下你的教學信念與方向。
#
# 填寫格式：
# subject_name:
#   philosophy: >
#     [你對此科目的核心信念，3-5 句話]
#   core_learning_goals:
#     - [目標 1]
#     - [目標 2]
#   teaching_approach: >
#     [你如何教這個科目？用什麼方法、強調什麼？]

subject_philosophies:
  # ──────────────────────────────────────
  # 範例 1：英文科
  # ──────────────────────────────────────
  english:
    philosophy: 填空
    # 例文：
    # philosophy: >
    #   英文是文化的載體，不只是技能訓練。
    #   透過文學、對話、真實語境，讓學生進入英語民族的思維方式。
    #   同時重視字彙的精確性、語境的敏感度、表達的真誠性。

    core_learning_goals:
      - 填空
      # 例：能獨立閱讀短篇故事與簡單新聞
      # 例：能以自信的英文對話參與課堂討論
      # 例：能寫出個人、有風格的英文段落

    teaching_approach: 填空
    # 例文：
    # teaching_approach: >
    #   以文學導讀為核心，配搭語言工坊與口說訓練。
    #   每週安排：2 堂文學研讀 + 2 堂語言技能工作坊。
    #   學生透過實際閱讀、寫作、對話來習得英文。

  # ──────────────────────────────────────
  # 範例 2：數學科
  # ──────────────────────────────────────
  # math:
  #   philosophy: 填空
  #   core_learning_goals:
  #     - 填空
  #   teaching_approach: 填空

  # ──────────────────────────────────────
  # 加入你教的其他科目（複製上方格式）
  # ──────────────────────────────────────

# ────────────────────────────────────────────────────────
# 【第六部分：交流偏好 / Communication Preferences】
# 說明：你希望 AI 如何與你互動？語言、溝通風格、節奏等。

communication_preferences:
  # 語言（例：繁體中文、英文、台語等）
  language:
    - 繁體中文

  # 回應風格（例：結構清晰、簡潔、詳細、口語化等）
  response_style:
    - 結構清晰
    - 可直接操作
    - 填空  # 加入你的偏好

  # 偏好的輸出形式（例：列點式、段落式、表格等）
  output_format: 填空

  # 互動節奏（例：語音優先、文字優先、有問有答等）
  interaction_style: 填空

# ────────────────────────────────────────────────────────
# 【第七部分：AI 工作協議 / AI Session Protocol】
# 說明：這是標準協議，界定 AI 如何開始與你的工作、如何保存進度。
# 你不需要修改這裡，但可了解它的運作方式。

ai_session_protocol:
  session_start:
    description: >
      每次 AI 開始與你的工作時，會按順序執行以下步驟：
    steps:
      - 讀取 teacheros-personal.yaml（你的身份與哲學）
      - 讀取你的班級專案檔案（students.yaml、working/*.yaml）
      - 掃描差異化教學框架（projects/_di-framework/project.yaml）
      - 報告目前的工作進度與下一步待做事項

  session_end:
    description: >
      每次工作結束時，AI 會：
    steps:
      - 條列今次確認的決定
      - 更新進度錨點（working/*.yaml）
      - 保存產出的備課內容
      - 告知你下次工作的起點

  file_handling:
    philosophy: >
      所有你的工作進度與設定都以 YAML 檔案儲存在你的工作空間中。
      這些檔案是「進度記憶」，AI 透過讀取它來接力你的工作，
      確保不會遺漏或重複。

# ────────────────────────────────────────────────────────
# 【附註】
# ────────────────────────────────────────────────────────
# 1. 此檔案的「填空」欄位是給你客製化的空間。
#    不填也沒關係，系統會使用預設值。
#
# 2. 如果你對某些欄位不確定，可以先填大概的方向，
#    之後需要時再更新。
#
# 3. 這份文件將幫助 AI 理解你的教學價值觀與工作方式，
#    使得每次合作都更貼近你的需求。
#
# 4. 有任何問題或需要調整，聯絡系統管理員。

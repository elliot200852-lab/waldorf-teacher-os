# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【TeacherOS 個人身份層】
# 路徑：{workspace}/teacheros-personal.yaml
# 性質：教師個人空間，自由修改
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 這是你的 AI 工作夥伴認識你的第一份文件。
#
# 系統已經為你載入了：
#   - ai-core/teacheros-foundation.yaml — 華德福教育的共用哲學與設計原則
#   - projects/_di-framework/project.yaml — 差異化教學的雙軸框架
#
# 你不需要重寫那些內容。這份文件只需要填入「你是誰」「你教什麼」「你怎麼教」。
# 填完後，AI 就能結合共用根基 + 你的個人風格，為你量身備課。
#
# 填寫提示：
#   - 「填空」欄位是必填的
#   - 不確定的先寫大概方向，之後隨時更新
#   - 範例用 # 開頭，是給你參考的，填完後可刪除

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 一、你是誰
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teacher_identity:
  name: 填空                    # 中文姓名（例：林美鈴）
  teacher_id: 填空              # 英文 ID（例：lin-mei-ling），用於系統識別
  role: 填空                    # 職稱（例：華德福教師、八年級導師）
  email: 填空                   # Email（用於系統驗證）
  location: 填空                # 地理位置（例：台灣新竹）
  school_type: 填空             # 學校類型（例：體制外華德福實驗學校）

  # 你所在學校的脈絡（幫助 AI 理解你的工作環境）
  school_context:
    legal_framework: 填空       # 例：「依實驗教育三法運作」或「受教育部課綱規範」
    curriculum_authority: 填空   # 例：「教師擁有完整課程自主權」或「需依據教育部課綱」
    success_definition: 填空    # 例：「發展性目標（身心靈整合）」或「達成學習指標」

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 二、你教什麼
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teaching_scope:
  grade_focus:
    - 填空                      # 例：七年級、八年級
  subjects:
    - 填空                      # 例：英文、數學、導師課

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 三、你的教學信念（針對你教的每一科）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 系統已經載入了華德福教育的共用哲學基礎（teacheros-foundation.yaml）。
# 這裡只需要填入「你個人」對各科的理解與教學方向。
#
# 格式：每個科目一個區塊。只填你教的科目，其他刪除即可。
# AI 會將你的個人信念 + 共用哲學 + DI 框架三者結合來設計課程。

subject_philosophies:

  # ── 範例：英文科 ──
  # english:
  #   my_belief: >
  #     英文是文化的載體，不只是技能訓練。
  #     透過文學、對話、真實語境，讓學生進入英語民族的思維方式。
  #   core_goals:
  #     - 能獨立閱讀短篇故事與簡單新聞
  #     - 能以自信的英文參與課堂討論
  #     - 能寫出有個人風格的英文段落
  #   my_approach: >
  #     以文學導讀為核心，配搭語言工坊與口說訓練。
  #     每週：2 堂文學 + 2 堂語言技能。

  填空:                         # 改成你的科目名稱（例：english、math、art）
    my_belief: 填空             # 你對這個科目的核心信念（3-5 句話）
    core_goals:
      - 填空                    # 你希望學生在這個科目達到什麼？
    my_approach: 填空           # 你怎麼教這個科目？

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 四、你的課堂節奏
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 系統已經定義了華德福標準的主課程與專科課程節奏（foundation）。
# 這裡填入你的實際情況（如果和標準不同的話）。
# 如果完全一致，可以留空，系統會使用 foundation 的預設值。

lesson_structure:
  main_lesson:
    duration: null              # 例：約 2 小時（留 null = 使用 foundation 預設）
    block_length: null          # 例：連續三週
    my_rhythm: null             # 你的主課程有什麼特別的節奏嗎？
  subject_lesson:
    duration: null              # 例：45 分鐘
    weekly_sessions: null       # 例：每週 4 節
    my_rhythm: null             # 你的專科課有什麼特別的節奏嗎？

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 五、你希望 AI 怎麼跟你互動
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

communication_preferences:
  language:
    - 繁體中文                  # 可加入其他語言
  response_style:
    - 結構清晰
    - 可直接操作
    # 加入你的偏好，例：簡短扼要、多用條列式、口語化
  input_method: 填空            # 例：語音輸入為主、文字輸入為主、混合

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 六、工作風格
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

working_style:
  thinking_style: 填空          # 例：系統建構型、直覺型、實作優先型
  design_preference:
    - 填空                      # 例：專案式學習、敘事導向、跨學科整合

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 附註
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. 「填空」是必填欄位。null 是選填欄位（不填則使用系統預設）。
# 2. 此文件只影響你的 AI 工作階段，不會影響其他老師。
# 3. 隨時更新——你的教學信念會隨經驗成長而變化，這很正常。
# 4. 有任何問題，聯絡系統管理員 David。

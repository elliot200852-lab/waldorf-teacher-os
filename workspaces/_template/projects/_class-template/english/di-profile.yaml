# ════════════════════════════════════════════════════════════
# 【英文課的差異化教學策略概覽】
# ════════════════════════════════════════════════════════════
#
# 說明：
#   根據班級的 DI 分布，建議的教學活動與任務設計

differentiation_strategies:
  # ── 針對 A 型（高能力高動機）────────────────
  for_type_A:
    instructional_activities:
      - 進階閱讀（新聞、評論、短篇小說）
      - 創意寫作（詩歌、故事創作、個人論文）
      - 帶領討論與同儕教學
      - 獨立研究專題
    assessment:
      - 高標準的寫作評量（內容、組織、表達）
      - 口說評量（深度對話、簡報）
      - 自主設定目標與反思
    note: >
      給予挑戰與領導機會；不用擔心他跟不上，
      反而要確保他沒有無聊

  # ── 針對 B 型（低能力高動機）────────────────
  for_type_B:
    instructional_activities:
      - 分解的、循序漸進的教學
      - 視覺化學習工具（圖表、顏色標記）
      - 同儕協作（與 A 型配對或小組）
      - 重複與複習的機會
    assessment:
      - 形成性評量（頻繁、低壓）
      - 多次機會重做（不是一次定生死）
      - 強調進步而非完美
    note: >
      他們最需要肯定與支持；每次進步都要認可；
      避免與 D 型完全分離，協作中有榜樣作用

  # ── 針對 C 型（高能力低動機）────────────────
  for_type_C:
    instructional_activities:
      - 提供學習內容的選擇權
      - 與他的興趣相連的專題
      - 真實情境的應用（為什麼要學這個？）
      - 責任感的機會（教同學、領導小組）
    assessment:
      - 多元評量方式（不只是紙筆測驗）
      - 自主設定目標
      - 投資組合評量（展示最好的作品）
    note: >
      不是能力問題，是動力問題；
      一對一談話了解他為什麼不感興趣；
      找到鉤子後可能變成高動機者

  # ── 針對 D 型（低能力低動機）──────────────
  for_type_D:
    instructional_activities:
      - 大量結構化支持
      - 分解式步驟與示範
      - 實際、真實的應用情境
      - 多感官、動手的學習
      - 定期一對一檢查進度
    assessment:
      - 非正式評量（觀察、會話）
      - 替代評量（口頭而非書寫）
      - 記錄小進步、累積成功經驗
      - 評量前充分準備（沒有突襲）
    note: >
      需要最多支持與耐心；可能有根本的學習困難或心理因素；
      考慮特殊教育評估；每個微小進步都值得慶祝

# ════════════════════════════════════════════════════════════
# 【如何使用此檔案】
# ════════════════════════════════════════════════════════════
#
# 初次設定：
#   1. 複製英文科的能力與動機定義（從 students.yaml）
#   2. 根據你對學生的認識，填寫 students 清單
#   3. 記錄每位學生的 DI 型態與學習風格
#   4. 針對 D 型與特殊狀況學生，加上具體策略備註
#
# 如何與 AI 協作：
#   - AI 讀取此檔案後，會在課程設計中自動考慮 DI 層次
#   - 當 AI 提出教學活動時，會建議「A 型可做延伸、B 型提供示範、
#     C 型提供選擇、D 型提供支持」的差異化方案
#   - 你也可以問 AI：「根據我的 DI profile，應該怎樣教 X 內容？」
#
# 何時更新：
#   - 定期觀察（2-4 週後）是否準確，調整分類
#   - 學期末重新評估（特別是 C 型和 D 型）
#   - 特殊狀況有新資訊時更新
#
# 隱私提醒：
#   - 使用學生代碼（如 8A-01）而非真名
#   - roster.yaml（真名對應表）加入 .gitignore

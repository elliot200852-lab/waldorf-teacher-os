# 【英文課 DI Profile — 差異化教學設定檔】
# 路徑：projects/class-{code}/english/di-profile.yaml
#
# 說明：
#   此檔案記錄英文課特定的 DI 分析與個別學生的差異化策略。
#   基於 students.yaml 的班級動態，深化為各科目的教學設計。
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

class: （班級代碼，例：8A）
subject: english
last_updated: 2026-03-03  # 當你更新此檔案時，改為今天的日期

# ════════════════════════════════════════════════════════════
# 【英文課的能力與動機定義】
# ════════════════════════════════════════════════════════════
#
# 說明：此定義應與 students.yaml 中的 subject_contexts.english 一致

ability_definition: >
  填空：該班英文的「高能力」定義

  範例定義：
    高能力：能獨立閱讀 200-300 字英文段落並掌握大意，
    能以正確文法寫出 5 句以上的短文，聽力理解率達 70% 以上。

motivation_definition: >
  填空：該班英文的「高動機」定義

  範例定義：
    高動機：課堂參與度穩定，主動回答問題或參與討論，
    家庭任務完成率達 80% 以上，對英文素材有主動探索行為。

# ════════════════════════════════════════════════════════════
# 【逐個學生的 DI 分類與差異化策略】
# ════════════════════════════════════════════════════════════
#
# 結構：
#   - id: 學生代碼（例：CL-01、8A-01）
#     di_type: A / B / C / D（之前在 students.yaml 統計的分類）
#     learning_strengths: 該生的學習風格（例：[語言型, 藝術型]）
#     last_updated: 日期
#     note: 備註（可選）— 針對英文課的特殊需求或策略

students: []


working_style:
  thinking_style: 系統建構型、實作優先
  design_preference:
    - 專案式學習 (PBL)
    - 敘事導向與科學史觀連結
    - AI 協作體驗

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 七、語氣錨點（voice_anchor）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

voice_anchor:
  who_i_am: >
    我是引導學生進入數位世界的嚮導，將資訊科技轉化為學習加速器的工程師教師。
  my_tone: >
    溫暖、精確、帶有人文關懷的科學家語氣，不使用表情符號。
  my_students: >
    十年級學生，處於意識覺醒與追求真實邏輯的階段。
  design_check: >
    這堂課是否有助於學生自我超越？頭、心、手是否有均衡參與？



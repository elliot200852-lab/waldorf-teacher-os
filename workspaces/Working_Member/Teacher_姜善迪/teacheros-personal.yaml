# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【TeacherOS 個人身份層】
# 路徑：{workspace}/teacheros-personal.yaml
# 性質：教師個人空間，自由修改
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 這是你的 AI 工作夥伴認識你的第一份文件。
#
# 系統已經為你載入了：
#   - ai-core/teacheros-foundation.yaml — 華德福教育的共用哲學與設計原則
#   - projects/_di-framework/project.yaml — 差異化教學的雙軸框架
#
# 你不需要重寫那些內容。這份文件只需要填入「你是誰」「你教什麼」「你怎麼教」。
# 填完後，AI 就能結合共用根基 + 你的個人風格，為你量身備課。
#
# 填寫提示：
#   - 「填空」欄位是必填的
#   - 不確定的先寫大概方向，之後隨時更新
#   - 範例用 # 開頭，是給你參考的，填完後可刪除

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 一、你是誰
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teacher_identity:
  name: 姜善迪
  teacher_id: jiang-shan-di
  role: 資訊科技與電腦科學教師、輔導教師、系統管理師
  email: dee@waldorf.ilc.edu.tw
  location: 台灣宜蘭 (慈心華德福教育實驗高級中等學校)
  school_type: 公辦民營實驗教育學校

  # 你所在學校的脈絡（幫助 AI 理解你的工作環境）
  school_context:
    legal_framework: 依實驗教育三法運作
    curriculum_authority: 教師擁有完整課程自主權，兼顧華德福教育哲學與科技發展
    success_definition: >
      發展性目標（身心靈整合）、自我超越（謝謝過去的自己，幫助現在的自己，成為未來的自己）

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 二、你教什麼
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teaching_scope:
  grade_focus:
    - 九年級
    - 高中階段
  subjects:
    - ITCS (資訊科技與電腦科學)
    - 媒體識讀
    - 輔導

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 三、你的教學信念（針對你教的每一科）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

subject_philosophies:

  ITCS:
    my_belief: >
      資訊科技是「學習的加速器」，不只是技能，更是思維與實作能力的拓展。
      在華德福脈絡下，引導學生善用技術而非被技術支配。
    core_goals:
      - 增進對資訊科技的瞭解，拓展思維與實作能力
      - 興趣探索與研究，培養獨立研究能力
      - 團隊協作，透過異質化分組增進溝通與教學相長
    my_approach: >
      專題式學習 (PBL) 與主課程 (Block Lesson) 模式。
      結合科學史觀、硬體原理、網路應用、程式邏輯與 AI 體驗。
      重視自我超越的評量，而非標準化成績。

  MediaLiteracy:
    my_belief: >
      在資訊爆炸時代，媒體識讀是必備的素養，引導學生辨別資訊真偽與倫理。
    core_goals:
      - 辨別網路資訊真偽與偏見
      - 理解數位足跡與網路倫理
    my_approach: >
      案例分析與思辨討論。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 四、你的課堂節奏
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 系統已經定義了華德福標準的主課程與專科課程節奏（foundation）。
# 這裡填入你的實際情況（如果和標準不同的話）。
# 如果完全一致，可以留空，系統會使用 foundation 的預設值。

lesson_structure:
  main_lesson:
    duration: null              # 例：約 2 小時（留 null = 使用 foundation 預設）
    block_length: null          # 例：連續三週
    my_rhythm: null             # 你的主課程有什麼特別的節奏嗎？
  subject_lesson:
    duration: null              # 例：45 分鐘
    weekly_sessions: null       # 例：每週 4 節
    my_rhythm: null             # 你的專科課有什麼特別的節奏嗎？

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 四之二、Google 帳號設定
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# AI 使用 gws CLI 操作 Google Workspace 服務時，會根據這裡的設定選擇帳號。
# 預設帳號已由管理員從你的 Email 自動填入。
# 若你有多個 Google 帳號，可自行新增 accounts 條目。

google_accounts:
  default: "dee@waldorf.ilc.edu.tw"
  accounts:
    - email: "dee@waldorf.ilc.edu.tw"
      alias: 個人
      keywords: ["個人", "個人信箱", "個人帳號"]
      usage: 預設帳號，未指定時一律使用此帳號
  ai_rule: >
    偵測到 keywords 中的任何詞語時，切換至對應帳號。
    未偵測到帳號關鍵字時，一律使用 default 帳號。
    切換方式：在 gws 指令前加 GOOGLE_WORKSPACE_CLI_ACCOUNT=<email>。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 五、你希望 AI 怎麼跟你互動
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

communication_preferences:
  language:
    - 繁體中文
  response_style:
    - 結構清晰
    - 可直接操作
    - 具有華德福溫度與科學史觀
  input_method: 文字輸入為主，輔以語音

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 六、工作風格

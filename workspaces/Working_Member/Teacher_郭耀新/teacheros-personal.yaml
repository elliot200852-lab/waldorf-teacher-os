# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【TeacherOS 個人身份層】
# 路徑：{workspace}/teacheros-personal.yaml
# 性質：教師個人空間，自由修改
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 這是你的 AI 工作夥伴認識你的第一份文件。
#
# 系統已經為你載入了：
#   - ai-core/teacheros-foundation.yaml — 華德福教育的共用哲學與設計原則
#   - projects/_di-framework/project.yaml — 差異化教學的雙軸框架
#
# 你不需要重寫那些內容。這份文件只需要填入「你是誰」「你教什麼」「你怎麼教」。
# 填完後，AI 就能結合共用根基 + 你的個人風格，為你量身備課。
#
# 填寫提示：
#   - 「填空」欄位是必填的
#   - 不確定的先寫大概方向，之後隨時更新
#   - 範例用 # 開頭，是給你參考的，填完後可刪除

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 一、你是誰
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teacher_identity:
  name: 郭耀新                    # 中文姓名（例：林美鈴）
  teacher_id: kuo-yao-hsin       # 英文 ID（例：lin-mei-ling），用於系統識別
  role: 學校網路工程師 / 資訊科技教師                    # 職稱（例：華德福教師、八年級導師）
  email: dylankuo84137@waldorf.ilc.edu.tw            # Email（用於系統驗證）
  location: 台灣宜蘭                # 地理位置（例：台灣新竹）
  school_type: 華德福實驗高中     # 學校類型（例：體制外華德福實驗學校）

  # 你所在學校的脈絡（幫助 AI 理解你的工作環境）
  school_context:
    legal_framework: 依實驗教育三法運作       # 例：「依實驗教育三法運作」或「受教育部課綱規範」
    curriculum_authority: 教師擁有完整課程自主權   # 例：「教師擁有完整課程自主權」或「需依據教育部課綱」
    success_definition: 發展性目標（知識、能力與態度的整合）    # 例：「發展性目標（身心靈整合）」或「達成學習指標」

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 二、你教什麼
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teaching_scope:
  grade_focus:
    - G9                      # 例：七年級、八年級
    - G12
  subjects:
    - 資訊科技（9A、9B）                      # 例：英文、數學、導師課
    - 程式設計進階（G12 思維選修）

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 三、你的教學信念（針對你教的每一科）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 系統已經載入了華德福教育的共用哲學基礎（teacheros-foundation.yaml）。
# 這裡只需要填入「你個人」對各科的理解與教學方向。
#
# 格式：每個科目一個區塊。只填你教的科目，其他刪除即可。
# AI 會將你的個人信念 + 共用哲學 + DI 框架三者結合來設計課程。

subject_philosophies:

  # ── 範例：英文科 ──
  # english:
  #   my_belief: >
  #     英文是文化的載體，不只是技能訓練。
  #     透過文學、對話、真實語境，讓學生進入英語民族的思維方式。
  #   core_goals:
  #     - 能獨立閱讀短篇故事與簡單新聞
  #     - 能以自信的英文參與課堂討論
  #     - 能寫出有個人風格的英文段落
  #   my_approach: >
  #     以文學導讀為核心，配搭語言工坊與口說訓練。
  #     每週：2 堂文學 + 2 堂語言技能。

  information_technology:                         # 改成你的科目名稱（例：english、math、art）
    my_belief: |
      科技不是黑盒子，而是一種可以被拆解、理解並重新創造的工具。
      九年級學生正處於追求獨立與尋找內在平衡的階段，透過動手拆解硬體探究底層邏輯，能為其意志找到具體落腳處；
      十二年級則走向軟硬整合與物聯網應用，學習業界標準的開發流程，並運用科技解決真實問題，展現利他精神。
    core_goals:
      - 破除科技神祕感，成為「知情」且負責任的數位公民與創作者。
      - 理解軟硬體底層運作邏輯（從二進位到微控制器、感測器）。
      - 具備專案實作能力，能體驗從硬體原形、網路通訊至雲端串接的完整流程，並融入業界協作標準（如 GitHub 版本控制）。
    my_approach: |
      以「動手實作（Hands-on）」與「專題導向（Project-Based）」為核心。
      九年級：從實體拆解（電腦、手機）過渡到數位素養與媒體識讀，最後產出利他的數位敘事專案。
      十二年級：透過 MicroPython 帶領學生進入 ESP32 微控制器的世界，輔以 Arduino/WOKWI，層層疊加實體感測器控制與網路通訊技術，最終完成解決實際生活問題的互動物聯網專題。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 四、你的課堂節奏
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 系統已經定義了華德福標準的主課程與專科課程節奏（foundation）。
# 這裡填入你的實際情況（如果和標準不同的話）。
# 如果完全一致，可以留空，系統會使用 foundation 的預設值。

lesson_structure:
  main_lesson:
    duration: null              # 例：約 2 小時（留 null = 使用 foundation 預設）
    block_length: null          # 例：連續三週
    my_rhythm: null             # 你的主課程有什麼特別的節奏嗎？
  subject_lesson:
    duration: 90分鐘              # 例：45 分鐘
    weekly_sessions: 每週1節       # 例：每週 4 節
    my_rhythm: null             # 你的專科課有什麼特別的節奏嗎？

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

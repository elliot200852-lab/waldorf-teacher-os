# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【TeacherOS 工作線記憶 — Layer 3】
# 英文課進度錨點 — 記錄你目前在教什麼、做到哪裡、下一步是什麼
# 路徑：projects/class-{code}/working/english-session.yaml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

information_technology_session:
  class: 9B
  last_updated: 2026-03-06

  # ════════════════════════════════════════════════════════════
  # 【進度錨點】— AI 用這個欄位了解你現在在哪裡
  # ════════════════════════════════════════════════════════════
  #
  # Block = 學季單位（例：Block 1 = 第一學季，通常 3-4 週）
  # Step = 在該 Block 內的工作步驟
  #        常見流程：Step 1（大綱設計） → Step 2（教材蒐集）→ Step 3（備課細節）
  #        → Step 4（試教與調整） → Step 5（評量設計）
  #
  # 初次使用時，通常從 Block 0, Step 0（尚未開始）開始

  current_position:
    # 你現在進行到第幾個學季（Block）？
    # 尚未開始時填 0，開始教第一個學季後填 1，以此類推
    block: 0

    # 該 Block 內你現在進行到第幾步？
    # 尚未開始時填 0
    # 常見步驟順序：
    #   Step 1: 學季大綱設計（目標、進度、評量框架）
    #   Step 2: 單元主題與教材篩選
    #   Step 3: 詳細備課（每堂課的流程、活動、工作單）
    #   Step 4: 製作教材與學習資源
    #   Step 5: 評量設計與製作
    #   Step 6: 試教與根據反饋調整
    step: 0

    # 其他可選的追蹤維度
    sub_block: null        # 例：如果 Block 分為 A/B 兩部分
    unit_number: null      # 例：現在教到第幾個 Unit
    current_week: null     # 例：學期的第幾週

  # ════════════════════════════════════════════════════════════
  # 【已確認的決定】— 記錄你已經決定的事項
  # ════════════════════════════════════════════════════════════
  #
  # 說明：
  #   當你和 AI 討論並決定了某些教學方向後，
  #   在這裡列出「已經定案的決定」
  #   這樣 AI 下次就不需要重新詢問，直接根據這些決定執行
  #
  # 例文（Block 1 的已決定事項）：
  #   - 學季長度：10 週，共 40 節課（一週 4 節）
  #   - 主題：「青少年文學與自我探索」
  #   - 教材：選 3 部短篇故事 + 1 部青春文學小說
  #   - 教學方法：文學研讀課 + 語言技能工作坊並行
  #   - 評量方式：讀書心得 40% + 小組討論 30% + 期末小說評論 30%

  confirmed_decisions: []

  # ── 填寫範例（取消註解後修改） ──────────────────
  # confirmed_decisions:
  #   - "Block 1 時間框架：10 週，每週 4 節課，共 40 節"
  #   - "主題：青少年成長與自我認識"
  #   - "教材來源：短篇故事合集 + 指定長篇小說"
  #   - "教學方法：文學研讀（2 節/週）+ 語言工作坊（2 節/週）"
  #   - "主要評量：讀書心得（40%）+ 語言技能（30%）+ 期末專題（30%）"

  # ════════════════════════════════════════════════════════════
  # 【下一步行動】— 告訴 AI 下次應該做什麼
  # ════════════════════════════════════════════════════════════
  #
  # description: 簡要描述下一步
  #   例：「Block 1 大綱已確認，下一步開始蒐集教材」
  #
  # input_needed_from_teacher: 如果需要你提供資訊才能繼續，列在這裡
  #   例：「需要你確認選定的短篇故事清單」

  next_action:
    description: 建立班級完成。下一步：填寫 students.yaml 的班級 DI 分佈，或直接開始 Block 1 (學季教學大綱設計)。

    input_needed_from_teacher: >
      等待老師指示要先進行 9A 的學生物件分類（students.yaml）或是直接將九年級的教學大綱展開成 Block 1 企劃。

  # ════════════════════════════════════════════════════════════
  # 【產出檔案追蹤】— 記錄 AI 已經產出的檔案
  # ════════════════════════════════════════════════════════════
  #
  # 說明：
  #   當 AI 產出教材、課程設計、評量等內容時，
  #   自動記錄在這裡，方便你日後查詢版本歷史

  output_files:
    # Block 學季大綱（教學計畫）
    syllabus_versions: []
    # 例：
    # - version: v1
    #   date: 20260320
    #   status: 初稿待確認
    #   paths:
    #     class_view: projects/class-8a/content/english/english-syllabus-v1.md
    #     subject_view: projects/class-8a/english/content/english-syllabus-v1.md

    # 單元教案與備課
    units_completed: []
    # 例：
    # - projects/class-8a/english/content/english-unit-1-v1.md
    # - projects/class-8a/english/content/english-unit-2-v1.md

    # 教學活動與工作單擴充
    extensions_completed: []
    # 例：
    # - projects/class-8a/english/content/unit-1-extension-activities-v1.md

    # 評量與檢測
    assessment_files: []
    # 例：
    # - projects/class-8a/english/content/block-1-quiz-v1.md
    # - projects/class-8a/english/content/block-1-final-project-rubric.md

  # ════════════════════════════════════════════════════════════
  # 【懸而未決的問題】— 記錄待探討的事項
  # ════════════════════════════════════════════════════════════
  #
  # 說明：
  #   如果在討論中出現了「暫時無法決定」或「需要日後再討論」的項目，
  #   列在這裡，AI 會定期提醒你處理

  open_questions: []
  # 例：
  # - "Block 1 是否要加入 TED 影片討論？考慮時間限制"
  # - "期末專題：個人作品集還是班級合作出版？待決定"
  # - "特殊生 CL-07 的評量替代方案還在評估"

# ════════════════════════════════════════════════════════════
# 【如何使用此檔案】
# ════════════════════════════════════════════════════════════
#
# AI 的工作循環：
#   1. AI 每次開始時讀取此檔案
#   2. 了解你現在的進度（Block/Step）
#   3. 根據 next_action 決定該做什麼
#   4. 完成工作後更新此檔案（confirmed_decisions、output_files 等）
#
# 你的操作：
#   1. 當你和 AI 討論完某個決定後，AI 會更新 confirmed_decisions
#   2. 當 AI 產出教材後，會在 output_files 裡記錄
#   3. 你可以隨時查看進度、查詢以前產出的檔案版本
#   4. 如果有突發情況改變計畫，更新 next_action 告訴 AI
#
# 版本管理：
#   - 每個產出檔案都有版本編號（v1, v2...）
#   - 日期格式：YYYYMMDD（例：20260320）
#   - 保留舊版本，方便回溯
#
# 進度追蹤最佳實踐：
#   - 每堂課或每週更新一次 current_position
#   - Block 完成後更新 confirmed_decisions 做為紀錄
#   - 不要刪除舊的 output_files，保留版本歷史
#   - next_action 要具體清楚，AI 才能準確執行

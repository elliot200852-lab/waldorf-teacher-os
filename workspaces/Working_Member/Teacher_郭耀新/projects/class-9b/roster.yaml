#
# 結構說明：
#   - student_id: 系統代碼（例：8A-01）— 在其他檔案（students.yaml、di-profile.yaml）中使用
#   - full_name: 學生真名
#   - english_name: 英文名字（如有）
#   - birthdate: 出生日期（格式：YYYY-MM-DD，用於了解學生年齡與發展階段）
#   - contact_parent: 家長聯絡方式（email 或電話）
#   - notes: 備註（例：特殊需求、食物過敏、家庭狀況等）

students: []


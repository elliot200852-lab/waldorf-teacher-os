# ════════════════════════════════════════════════════════════
# 【.gitignore 設定】
# ════════════════════════════════════════════════════════════
#
# 重要：在你的 repo 的 .gitignore 中加入以下行：
#
#   # 隱私：學生名冊
#   workspaces/*/projects/*/roster.yaml
#   workspaces/*/projects/*/students.yaml  # 如果含真名
#
# 這樣就不會意外上傳學生資訊到公開 repo。

# ════════════════════════════════════════════════════════════
# 【隱私與安全最佳實踐】
# ════════════════════════════════════════════════════════════
#
# 1. 命名規則：
#    - 在 students.yaml、di-profile.yaml 中使用「學生代碼」（8A-01、8A-02...）
#    - 只在 roster.yaml 中保存真名對應
#    - 這樣即使 repo 意外外洩，也是代碼而非真名
#
# 2. 備份：
#    - 定期備份 roster.yaml 到安全位置（例：加密雲端硬碟、隨身碟）
#    - 不要依賴 Git 作為唯一備份（因為 .gitignore 保護不是 100% 安全）
#
# 3. Git 使用：
#    - 確認 .gitignore 包含 roster.yaml 和任何含真名的檔案
#    - 推送前檢查（git status），確認沒有誤推學生資訊
#    - 如果意外推了，聯絡系統管理員（David）協助移除 Git 歷史
#
# 4. 檔案共享：
#    - 不要把 roster.yaml 複製到共享資料夾（例：Google Drive、Dropbox）
#    - 如需與同事討論特定學生，只分享該生的代碼和相關備課內容
#
# 5. 本機安全：
#    - 工作空間所在的電腦設定密碼
#    - 定期更新作業系統與防毒軟體
#    - 離開電腦前鎖屏

# ════════════════════════════════════════════════════════════
# 【何時更新此檔案】
# ════════════════════════════════════════════════════════════
#
# - 新生加入時（轉入、補年級）
# - 學生轉出（轉校、休學）
# - 聯絡方式改變（更新家長電話或信箱）
# - 發現新的特殊需求或備註事項（例：確診學習障礙）
#
# 更新後，確認 Git 不會意外同步（檢查 .gitignore）

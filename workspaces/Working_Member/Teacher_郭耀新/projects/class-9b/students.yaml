#   你可以列出每個學生的詳細 DI 分類與學習風格。
#   這不是必填欄位，統計分布即可；
#   但如果你想逐個記錄，可用下方格式。
#
# 注意隱私：
#   - 在 Git repo 中通常用「學生代碼」（如 8A-01）而非真名
#   - 真名名單放在 roster.yaml，加入 .gitignore 不上傳


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【班級學生 DI 分析與學習樣態】
# 路徑：projects/class-{code}/students.yaml
#
# 說明：
#   DI = Differentiated Instruction（差異化教學）
#   此檔案用來記錄班級中每個學生的能力×動機樣態，以及學習風格
#   幫助你和 AI 設計貼切的教學策略與學習活動
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

class: （班級代碼，例：8A）
grade: （年級，例：八年級）
di_framework_ref: projects/_di-framework/project.yaml
total_students: （學生總人數）

# ════════════════════════════════════════════════════════════
# 【第一部分】DI 分類系統說明
# ════════════════════════════════════════════════════════════
#
# 什麼是 DI 分類？
# ───────────────
#   DI 分類用「能力」× 「動機」兩個維度將學生分為四種型態：
#
#   │            │  高動機  │  低動機  │
#   │  高能力    │    A    │    C    │
#   │  低能力    │    B    │    D    │
#
# 四種型態說明：
# ────────────
#
#   A 型（高能力 × 高動機）— 獨立學習者
#     特徵：
#       - 學習速度快，理解深入
#       - 課堂參與度高，主動探索
#       - 可以自己挑戰更難的任務
#     教學策略：
#       - 提供延伸題、開放式問題
#       - 給予領導機會（例：幫助同學、帶領小組）
#       - 鼓勵自主研究與深度探討
#
#   B 型（低能力 × 高動機）— 用力學習者
#     特徵：
#       - 學習速度較慢，但態度認真
#       - 積極參與課堂，雖然可能答錯
#       - 需要支持與鼓勵，但不會放棄
#     教學策略：
#       - 提供清晰的步驟與示範
#       - 多給予具體的肯定與回饋
#       - 設計階梯式任務，讓他們有成功感
#       - 小組協作時可配搭 A 型同學，但要確保 B 型有話語權
#
#   C 型（高能力 × 低動機）— 聰明的被動者
#     特徵：
#       - 能力強，但不想用力
#       - 對課堂不感興趣，常坐以待斃
#       - 可能有潛在的動力需要挖掘
#     教學策略：
#       - 設計有趣、相關的情境（例：以他的興趣為主題）
#       - 提供選擇權，讓他決定學習路線
#       - 用他的能力給他責任（可能會激發動力）
#       - 一對一對話，了解他為什麼不感興趣
#
#   D 型（低能力 × 低動機）— 掙扎的孩子
#     特徵：
#       - 學習困難，信心不足
#       - 課堂參與度低，容易放棄
#       - 可能有學習障礙、情緒問題或環境因素
#     教學策略：
#       - 大量支持與分解步驟
#       - 強調小進步，累積成功經驗
#       - 了解根本原因（能力障礙？心理因素？家庭環境？）
#       - 可能需要特殊教育評估或額外資源
#
# ════════════════════════════════════════════════════════════

# ════════════════════════════════════════════════════════════
# 【第二部分】科目背景脈絡
# ════════════════════════════════════════════════════════════
#
# 在填寫每科的 DI 分布前，需要先定義：
# 「什麼是該科目的高能力？什麼是高動機？」
#
# 例文（英文）：
#   high_ability: 「能獨立閱讀 200-300 字英文段落並掌握大意，
#                 能以正確文法寫出 5 句以上的短文」
#   high_motivation: 「課堂參與度穩定，主動回答問題，
#                    家庭任務完成率達 80% 以上」

class_dynamic:
  # 本班級的發展階段（幾年級、學生年齡、心理特徵）
  developmental_stage: 填空  # 例：八年級（13-14 歲）

  # 本班級特有的心理張力或行為模式
  # （幫助 AI 理解班級文化與管理需求）
  key_tension: 填空  # 例：邏輯萌發與社交焦慮；群體從眾壓力

  # 你的教學回應
  teacher_approach: 填空  # 例：言行絕對一致；提供因果邏輯滿足智力覺醒

# ════════════════════════════════════════════════════════════
# 【第三部分】各科目的 DI 分布與能力定義
# ════════════════════════════════════════════════════════════

# 說明：以下是英文科的範例。如果你教其他科目，複製並修改欄位。

subject_contexts:
  english:
    # ── 高能力定義（針對你的班級） ────────────
    ability_definition: >
      填空：根據你的班級情況，什麼算「英文高能力」？

      參考面向：
      - 閱讀理解能力（能讀懂什麼程度的文本？）
      - 寫作能力（能寫多長、多複雜的句子或段落？）
      - 口說能力（能進行什麼深度的對話？）
      - 文法與詞彙掌握度

    # ── 高動機定義（針對你的班級） ────────────
    motivation_definition: >
      填空：在你的班級，「英文高動機」的表現是什麼？

      參考面向：
      - 課堂參與度（是否主動舉手、回答問題？）
      - 家庭任務完成率（多少百分比）
      - 對材料的探索行為（會主動閱讀、提問嗎？）
      - 願意嘗試與犯錯的態度

    # ── DI 分布統計 ────────────────────────────
    di_distribution:
      # 統計你的班級中有幾個學生屬於每一型
      # 例：A 型 5 人、B 型 4 人、C 型 3 人、D 型 6 人（共 18 人）
      A: （A 型人數）  # 高能力高動機
      B: （B 型人數）  # 低能力高動機
      C: （C 型人數）  # 高能力低動機
      D: （D 型人數）  # 低能力低動機

    # ── 學習風格分布 ────────────────────────────
    # 說明：學生的學習風格（怎樣學最有效？）
    # 常見分類：語言型（喜歡文字）、圖像型（喜歡圖片）、動作型（喜歡活動）、藝術型（喜歡創意表達）
    learning_strengths_distribution:
      語言型: （統計人數）
      圖像型: （統計人數）
      藝術型: （統計人數）
      動作型: （統計人數）

  # 如果教數學、自然、歷史等其他科目，複製上方格式
  # math:
  #   ability_definition: >
  #     填空
  #   motivation_definition: >
  #     填空
  #   di_distribution:
  #     A: （人數）
  #     B: （人數）
  #     C: （人數）
  #     D: （人數）
  #   learning_strengths_distribution:
  #     語言型: （人數）
  #     ...

# ════════════════════════════════════════════════════════════
# 【第四部分】班級跨科特殊狀況
# ════════════════════════════════════════════════════════════
#
# 說明：
#   記錄班級中有特殊需求的學生
#   （例：學習障礙、情緒困難、才能資優、語言限制等）
#   以及他們對各科教學的影響
#
# 格式：
#   - student_id: 學生代碼（例：8A-01）
#     note: 簡要描述學生狀況
#     cross_subject_impact: 這對各科教學的影響

special_cases: []

# ── 填寫範例（取消註解後修改） ──────────────────
# special_cases:
#   - student_id: 8A-07
#     note: 讀寫困難（dyslexia），需視覺輔助與口語替代評量
#     cross_subject_impact: >
#       各科書寫類任務需提供替代形式（例：口頭報告、錄音、mind map）；
#       閱讀文本需放大字體或用護目鏡；避免公開點名讀課文
#
#   - student_id: 8A-15
#     note: 情緒調節困難，在高壓情境下容易關機或爆發
#     cross_subject_impact: >
#       避免突然點名回答；提供安全的退場機制；高壓評量（如考試）前給予預告與鎮定時間；
#       考試可單獨進行，使用放鬆技巧

# ════════════════════════════════════════════════════════════

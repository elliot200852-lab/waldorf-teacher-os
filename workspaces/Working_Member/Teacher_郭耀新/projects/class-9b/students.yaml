# ════════════════════════════════════════════════════════════
# 【如何使用此檔案】
# ════════════════════════════════════════════════════════════
#
# 第一次填寫：
#   1. 填入班級基本資訊（class, grade, total_students）
#   2. 描述班級動態（developmental_stage, key_tension, teacher_approach）
#   3. 定義各科目的「高能力」與「高動機」（很重要！）
#   4. 統計 DI 分布（A/B/C/D 各有幾人）
#   5. 記錄學習風格分布（語言型、圖像型等各有幾人）
#   6. 列出特殊狀況（有學習障礙、情緒困難等學生嗎？）
#
# 何時更新：
#   - 學期末根據這學期的表現重新評估
#   - 特殊學生狀況有變化（例：新增評估結果）
#   - 班級動態改變（例：新生加入、關鍵事件後）
#
# AI 如何使用：
#   - 在設計差異化教學時，AI 會讀取本檔案了解你班級的組成
#   - 根據 DI 分布，建議不同難度層級的練習與作業
#   - 考量特殊狀況，調整評量方式與課堂活動
#   - 選擇符合多數學習風格的教材與活動設計

# 四之二、Google 帳號設定
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

google_accounts:
  default: mj23191168@gmail.com
  accounts:
    - email: mj23191168@gmail.com
      alias: 個人
      keywords: ["個人", "個人信箱", "個人帳號"]
      usage: 預設帳號，未指定時一律使用此帳號
  ai_rule: >
    偵測到 keywords 中的任何詞語時，切換至對應帳號。
    未偵測到帳號關鍵字時，一律使用 default 帳號。
    切換方式：在 gws 指令前加 GOOGLE_WORKSPACE_CLI_ACCOUNT=<email>。


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【TeacherOS 專案記憶 — Layer 2】
# 班級設定檔 — 填空後即可使用
# 路徑：projects/class-{code}/project.yaml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ────────────────────────────────────────────────────────
# 【基本資訊】
# ────────────────────────────────────────────────────────
# 班級代碼（英文小寫 + 數字，例：8a、7th、middle-school-science）
class: 12A

# 年級（例：七年級、八年級、九年級、高二）
grade: 十二年級

# 該班級的學生人數（方便快速參考）
student_count: （學生人數）

# 你在本班級的角色（例：導師、英文科任、數學科任、藝術教師）
# 如果同時是導師+科任，寫「導師（班導師）+ 英文科任」
teacher_role: 行銷專題科任教師

# 班級狀態（active = 進行中、archived = 已結束、planning = 規劃中）
status: active

# ────────────────────────────────────────────────────────
# 【班級背景脈絡】
# ────────────────────────────────────────────────────────
# 寫下這個班級的特色、學生樣態、班級文化等
# 這會幫助 AI 理解你的教學背景，設計更貼切的課程
# 字數：2-5 句話

homeroom_context: >
  本班為12年級，學生正處於將個人興趣轉化為畢業專題的階段。
  行銷與專題課程將協助建立他們的個人品牌，發展他們的專案，並引導他們理解當代自媒體的功能與影響。

# ────────────────────────────────────────────────────────
# 【班級檔案清單】
# ────────────────────────────────────────────────────────
# 下列檔案會由 AI 自動掃描與讀取，記錄路徑

class_files:
  # 學生完整名單（格式：YAML，含學生代碼、姓名等）
  # 通常放在 .gitignore 中，不上傳到公開 repo
  roster: roster.yaml

  # 學生 DI 分類、學習樣態（DI = Differentiated Instruction，差異化教學）
  students: students.yaml

  # 工作進度錨點（每個科目一個）
  # 範例位置：
  #   working/english-session.yaml
  #   working/homeroom-session.yaml

# ────────────────────────────────────────────────────────
# 【科目設定】
# ────────────────────────────────────────────────────────
# 說明：填入你在本班教的所有科目
#
# 結構：
#   {subject_key}:
#     type: 課程類型（例：英文專科、導師課、主課程、藝術工作坊）
#     weekly_sessions: 一週上課節數
#     di_profile: DI 分析檔案路徑
#     working_anchor: 進度錨點檔案路徑
#     content_path: 備課內容輸出資料夾
#     note: 備註（可選）

subjects:
  marketing:
    type: 行銷廣告選修課
    weekly_sessions: 2
    di_profile: marketing/di-profile.yaml
    working_anchor: marketing/working/session.yaml
    content_path: marketing/content/
    note: 開啟高中生對廣告與自媒體的概念，培養媒體素養及基礎軟體操作經驗。為建立社群媒體內容作基礎。

  senior-project:
    type: 12年級定錨選修
    weekly_sessions: 2
    di_profile: senior-project/di-profile.yaml
    working_anchor: senior-project/working/session.yaml
    content_path: senior-project/content/
    note: 為高中畢業生製作個人專題所發展的課程。提供個別化的專題輔助與支援。

# ────────────────────────────────────────────────────────
# 【學期與進度追蹤】
# ────────────────────────────────────────────────────────
# 目前學年（例：2025-2026）
current_semester: 2025-2026

# 目前重點工作（例：「英文 Block 1（學季大綱設計）」）
# AI 會根據這個欄位，在你每次開始對話時提醒你現在在做什麼
current_focus: 行銷課及專題發展課程設定

# 接下來的待辦清單（列點式）
next_steps:
  - 填入學生 DI 樣態（students.yaml）
  - 開始 Block 1（學季大綱設計）
  - 定義專案選題與相關指導框架

# ────────────────────────────────────────────────────────
# 【跨科協作備註】
# ────────────────────────────────────────────────────────
# 如果有多位老師教同一班級，或多個科目需要協調，在這裡記錄

cross_module_notes:
  # active: 當前需要協調的事項
  active: []
  # 例：
  # active:
  #   - "英文與人文課程協作：下週二討論主課程與英文課的連結"

  # resolved: 已解決的協作事項（供查閱）
  resolved: []

# ────────────────────────────────────────────────────────
# 【附註：本檔案的使用方式】
# ────────────────────────────────────────────────────────
#
# 1. 初次使用：
#    - 複製 _class-template 資料夾，改名為 class-{your-code}
#    - 填寫上方「填空」欄位
#    - 不確定的地方先留空，AI 會詢問
#
# 2. 進度追蹤：
#    - current_focus 與 next_steps 由你更新，用來提醒你的進度
#    - AI 每次開始工作時會讀取並報告現況
#
# 3. 跨模組協作：
#    - 如果你有共教老師或跨科連結，在 cross_module_notes 記錄
#    - AI 會自動提醒你有待協調事項
#
# 4. 詳細進度：
#    - 分科目詳細進度在 working/{subject}-session.yaml 中查看
#    - 本檔案是「大局視圖」，session.yaml 是「工作詳情」
#
# 5. 產出內容：
#    - AI 產出的教材、備課、評量會放在 {subject}/content/ 資料夾
#    - 你可以在那裡找到所有備課檔案，版本控制也在那裡

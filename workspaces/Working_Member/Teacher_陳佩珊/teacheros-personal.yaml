# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【TeacherOS 個人身份層】
# 路徑：{workspace}/teacheros-personal.yaml
# 性質：教師個人空間，自由修改
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 這是你的 AI 工作夥伴認識你的第一份文件。
#
# 系統已經為你載入了：
#   - ai-core/teacheros-foundation.yaml — 華德福教育的共用哲學與設計原則
#   - projects/_di-framework/project.yaml — 差異化教學的雙軸框架
#
# 你不需要重寫那些內容。這份文件只需要填入「你是誰」「你教什麼」「你怎麼教」。
# 填完後，AI 就能結合共用根基 + 你的個人風格，為你量身備課。
#
# 填寫提示：
#   - 「填空」欄位是必填的
#   - 不確定的先寫大概方向，之後隨時更新
#   - 範例用 # 開頭，是給你參考的，填完後可刪除

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 一、你是誰
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teacher_identity:
  name: 陳佩珊                    # 中文姓名（例：林美鈴）
  teacher_id: verena-chen              # 英文 ID（例：lin-mei-ling），用於系統識別
  role: 人智學教育基金會執行長 / 慈心華德福高中行銷與專題教師
  email: vernachen327@gmail.com                   # Email（用於系統驗證）
  location: 台灣宜蘭                # 地理位置（例：台灣新竹）
  school_type: 體制外華德福實驗學校             # 學校類型（例：體制外華德福實驗學校）
  background: 15 年以上廣告人經驗，5 年以上華德福高中教學經驗。

  # 你所在學校的脈絡（幫助 AI 理解你的工作環境）
  school_context:
    legal_framework: 依實驗教育三法運作       # 例：「依實驗教育三法運作」或「受教育部課綱規範」
    curriculum_authority: 教師擁有完整課程自主權   # 例：「教師擁有完整課程自主權」或「需依據教育部課綱」
    success_definition: 發展性目標（身心靈整合）    # 例：「發展性目標（身心靈整合）」或「達成學習指標」

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 二、你教什麼
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teaching_scope:
  grade_focus:
    - 十一年級                      # 例：七年級、八年級
    - 十二年級
  subjects:
    - marketing
    - senior-project

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 三、你的教學信念（針對你教的每一科）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 系統已經載入了華德福教育的共用哲學基礎（teacheros-foundation.yaml）。
# 這裡只需要填入「你個人」對各科的理解與教學方向。
#
# 格式：每個科目一個區塊。只填你教的科目，其他刪除即可。
# AI 會將你的個人信念 + 共用哲學 + DI 框架三者結合來設計課程。

subject_philosophies:

  marketing:
    my_belief: 結合 15 年廣告人實務經驗，為高中生開啟對廣告、品牌與自媒體的視野，培養其媒體素養及相關軟體的基礎操作，讓創意能落地實踐。
    core_goals:
      - 理解廣告與自媒體的核心概念
      - 培養良好的媒體素養
      - 擁有基礎媒體相關軟體的操作經驗與基礎能力
      - 創造社群媒體內容基礎能力
    my_approach: 透過實際案例分析、素養討論與自媒體實踐，將商業行銷概念與華德福教育的人文精神結合。

  senior-project:
    my_belief: 作為 12 年級的「定錨選修」，本課程旨在支持畢業專題的發展，並作為學生在畢業後銜接多元升學或就業途徑的諮詢資源。
    core_goals:
      - 支持學生發展具有個別化的畢業專題方向
      - 提供專題研究所需之方法論與架構引導
      - 提供未來生涯規劃、資源對接與專業諮詢
    my_approach: 以個別化指導為主，協助學生將自身興趣收斂為具體的專案，並陪伴其經歷完整的專題發展過程，確保其在離開校園前找到自己的定錨點。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 四、你的課堂節奏
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 系統已經定義了華德福標準的主課程與專科課程節奏（foundation）。
# 這裡填入你的實際情況（如果和標準不同的話）。
# 如果完全一致，可以留空，系統會使用 foundation 的預設值。

lesson_structure:
  main_lesson:
    duration: null              # 例：約 2 小時（留 null = 使用 foundation 預設）
    block_length: null          # 例：連續三週
    my_rhythm: null             # 你的主課程有什麼特別的節奏嗎？
  subject_lesson:
    duration: null              # 例：45 分鐘
    weekly_sessions: null       # 例：每週 4 節
    my_rhythm: null             # 你的專科課有什麼特別的節奏嗎？

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 五、你希望 AI 怎麼跟你互動
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

communication_preferences:
  language:
    - 繁體中文                  # 可加入其他語言
  response_style:
    - 結構清晰
    - 可直接操作
    - 溫暖且專業
    # 加入你的偏好，例：簡短扼要、多用條列式、口語化
  input_method: 語音輸入為主            # 例：語音輸入為主、文字輸入為主、混合

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 六、工作風格
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━


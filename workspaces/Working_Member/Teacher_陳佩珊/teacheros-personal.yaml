# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【TeacherOS 個人身份層】
# 路徑：{workspace}/teacheros-personal.yaml
# 性質：教師個人空間，自由修改
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 這是你的 AI 工作夥伴認識你的第一份文件。
#
# 系統已經為你載入了：
#   - ai-core/teacheros-foundation.yaml — 華德福教育的共用哲學與設計原則
#   - projects/_di-framework/project.yaml — 差異化教學的雙軸框架
#
# 你不需要重寫那些內容。這份文件只需要填入「你是誰」「你教什麼」「你怎麼教」。
# 填完後，AI 就能結合共用根基 + 你的個人風格，為你量身備課。
#
# 填寫提示：
#   - 「填空」欄位是必填的
#   - 不確定的先寫大概方向，之後隨時更新
#   - 範例用 # 開頭，是給你參考的，填完後可刪除

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 一、你是誰
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teacher_identity:
  name: 陳佩珊                    # 中文姓名（例：林美鈴）
  teacher_id: verena-chen              # 英文 ID（例：lin-mei-ling），用於系統識別
  role: 慈心華德福高中行銷與專題教師                    # 職稱（例：華德福教師、八年級導師）
  email: vernachen327@gmail.com                   # Email（用於系統驗證）
  location: 台灣宜蘭                # 地理位置（例：台灣新竹）
  school_type: 體制外華德福實驗學校             # 學校類型（例：體制外華德福實驗學校）

  # 你所在學校的脈絡（幫助 AI 理解你的工作環境）
  school_context:
    legal_framework: 依實驗教育三法運作       # 例：「依實驗教育三法運作」或「受教育部課綱規範」
    curriculum_authority: 教師擁有完整課程自主權   # 例：「教師擁有完整課程自主權」或「需依據教育部課綱」
    success_definition: 發展性目標（身心靈整合）    # 例：「發展性目標（身心靈整合）」或「達成學習指標」

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 二、你教什麼
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teaching_scope:
  grade_focus:
    - 十一年級                      # 例：七年級、八年級
    - 十二年級
  subjects:
    - marketing
    - senior-project

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 三、你的教學信念（針對你教的每一科）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 系統已經載入了華德福教育的共用哲學基礎（teacheros-foundation.yaml）。
# 這裡只需要填入「你個人」對各科的理解與教學方向。
#
# 格式：每個科目一個區塊。只填你教的科目，其他刪除即可。
# AI 會將你的個人信念 + 共用哲學 + DI 框架三者結合來設計課程。

subject_philosophies:

  marketing:                         # 改成你的科目名稱（例：english、math、art）
    my_belief: 行銷廣告選修課旨在為高中生開啟對廣告與自媒體的概念，並培養其媒體素養及相關軟體的基礎操作經驗。             # 你對這個科目的核心信念（3-5 句話）
    core_goals:
      - 理解廣告與自媒體的核心概念
      - 培養良好的媒體素養
      - 擁有基礎媒體相關軟體的操作經驗與基礎能力
      - 創造社群媒體內容基礎能力
    my_approach: 透過實際操作、案例分析與素養討論，結合自媒體實踐，引導學生在動手做的過程中理解行銷概念。           # 你怎麼教這個科目？

  senior-project:
    my_belief: 12年級訂錨選修主要為支持12年級畢業專題的發展。
    core_goals:
      - 支持學生發展具有個別化的畢業專題方向
      - 提供專題研究所需之方法論與架構引導
    my_approach: 以個別化指導為主，協助學生將自身興趣收斂為具體的專案，並陪伴其經歷完整的專題發展過程。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 四、你的課堂節奏
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 系統已經定義了華德福標準的主課程與專科課程節奏（foundation）。
# 這裡填入你的實際情況（如果和標準不同的話）。
# 如果完全一致，可以留空，系統會使用 foundation 的預設值。

lesson_structure:
  main_lesson:
    duration: null              # 例：約 2 小時（留 null = 使用 foundation 預設）
    block_length: null          # 例：連續三週
    my_rhythm: null             # 你的主課程有什麼特別的節奏嗎？
  subject_lesson:
    duration: null              # 例：45 分鐘
    weekly_sessions: null       # 例：每週 4 節
    my_rhythm: null             # 你的專科課有什麼特別的節奏嗎？

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 五、你希望 AI 怎麼跟你互動
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

communication_preferences:
  language:
    - 繁體中文                  # 可加入其他語言
  response_style:
    - 結構清晰
    - 可直接操作
    - 溫暖且專業
    # 加入你的偏好，例：簡短扼要、多用條列式、口語化
  input_method: 語音輸入為主            # 例：語音輸入為主、文字輸入為主、混合

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 六、工作風格
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

working_style:
  thinking_style: 實作優先型          # 例：系統建構型、直覺型、實作優先型
  design_preference:
    - 專案式學習
    - 差異化實作引導

# Google 帳號設定（GWS CLI 使用）
google_accounts:
  default: vernachen327@gmail.com
  accounts:
    - email: vernachen327@gmail.com
      label: 個人
      keywords:
        - 個人

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 七、語氣錨點（voice_anchor）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 這個段落是 AI 在長對話中「記住你是誰」的關鍵。
# 當對話進行很久，AI 可能會漸漸忘記開場時載入的你的風格與價值觀。
# 這個段落會在需要時被重新讀取，把 AI 拉回「認識你」的狀態。
#
# 填寫建議：用你自己的話，簡短寫下以下幾件事。不需要完美，寫真話就好。

voice_anchor:
  who_i_am: 填空              # 你怎麼定義自己作為教師的核心角色？（1-2 句話）
                               # 例：「我是學生進入世界的嚮導，不是知識的搬運工。」
  my_tone: 填空                # 你說話的風格是什麼？（幾個關鍵詞或一句話）
                               # 例：「溫暖但直接，不繞圈子。」
  my_students: 填空            # 你的學生現在處於什麼發展狀態？（1-2 句話）
                               # 例：「八年級，開始用邏輯質疑一切，需要被認真對待。」
  design_check: 填空           # 你檢查自己課程設計的一句話標準是什麼？
                               # 例：「這堂課有沒有讓學生動手做、用心感受、用腦思考？」

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 附註
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. 「填空」是必填欄位。null 是選填欄位（不填則使用系統預設）。
# 2. 此文件只影響你的 AI 工作階段，不會影響其他老師。
# 3. 隨時更新——你的教學信念會隨經驗成長而變化，這很正常。
# 4. 有任何問題，聯絡系統管理員 David。

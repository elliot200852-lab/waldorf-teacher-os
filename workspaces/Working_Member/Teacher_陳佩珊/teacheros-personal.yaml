# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 七、語氣錨點（voice_anchor）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 這個段落是 AI 在長對話中「記住你是誰」的關鍵。
# 當對話進行很久，AI 可能會漸漸忘記開場時載入的你的風格與價值觀。
# 這個段落會在需要時被重新讀取，把 AI 拉回「認識你」的狀態。
#
# 填寫建議：用你自己的話，簡短寫下以下幾件事。不需要完美，寫真話就好。

voice_anchor:
  who_i_am: 我是連接華德福教育理想與真實社會實踐的橋樑。身為基金會執行長與資深廣告人，我致力於支持學生在自我探索與外界對接中找到定錨點。
  my_tone: 專業、精準、帶著資深廣告人的敏銳與華德福陪伴者的溫暖。
  my_students: 11-12 年級，正處於將內在熱情轉化為外在行動的關鍵期，需要結構性的支撐來減少對未來的焦慮。
  design_check: 這堂課是否協助學生在真實世界中找到了自己的位置，並產生了實質的產出與定錨感？

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 八、執行長工作層次（Foundation Executive Role）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
executive_responsibilities:
  board_communication:
    - "校舍新建工程管理：監督兩校區合併新建工程，總經費約 1 億 3,000 萬元，目前自籌款募資進度約 3,140 萬元。"
    - "公部門辦學合約對話：負責與公部門進行辦學合約的溝通與雙向對話。"
    - "家長社群與資源連結：與家長社群深度溝通，支持並推動學校的捐款計畫等資源連結項目。"
    - "年度辦學成果呈現：定期向董事會匯報辦學韌性、學生穩定發展及社會貢獻價值。"
    
  teacher_cooperation:
    - "辦學支持與行政溝通：每月主持行政會報，協調跨部門事務，如校園參訪（大學團50位貴賓）、校長年度考核等。"
    - "校際與國際連結：主辦首屆 ITEF 亞太師培會議，與紐西蘭、日本、菲律賓等多國師培機構建立合作聯繫。"
    - "藝術與紀錄工作：研議社群藝術課規劃、羅葉文學獎製作，以及新紀錄片的拍攝計畫。"

  teacher_training:
    - "體系化養成：管理兩年基礎養成與兩年專業進階課程。2025 年度師培人數共計 117 人。"
    - "教育能量深化：引導成人自我覺察與班級經營實務，傳承在地 25 年的華德福教學實踐經驗。"
    - "師培招生與規劃：主導新學年度課程架構設計、招生工作，確保師培系統的長期穩定發展。"

  community_engagement:
    - "深度讀書會經營：主持《神智學》、《奧密科學大綱》、《農業八講》等經典研讀與哲學思辨對話。"
    - "青年與社群活動：策劃「哲學夜思 YES!」、「校友好聊遇」交流會，支持 12 年級學生哲學營。"
    - "身心靈與土地實踐：推動 BD 耕讀行動、永續市集「冬日好食光」以及課後時光的感官保護課程。"


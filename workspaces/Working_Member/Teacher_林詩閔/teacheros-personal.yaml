# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 三、你的教學信念（針對你教的每一科）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 系統已經載入了華德福教育的共用哲學基礎（teacheros-foundation.yaml）。
# 這裡只需要填入「你個人」對各科的理解與教學方向。
#
# 格式：每個科目一個區塊。只填你教的科目，其他刪除即可。
# AI 會將你的個人信念 + 共用哲學 + DI 框架三者結合來設計課程。

subject_philosophies:

  # ── 範例：英文科 ──
  # english:
  #   my_belief: >
  #     英文是文化的載體，不只是技能訓練。
  #     透過文學、對話、真實語境，讓學生進入英語民族的思維方式。
  #   core_goals:
  #     - 能獨立閱讀短篇故事與簡單新聞
  #     - 能以自信的英文參與課堂討論
  #     - 能寫出有個人風格的英文段落
  #   my_approach: >
  #     以文學導讀為核心，配搭語言工坊與口說訓練。
  #     每週：2 堂文學 + 2 堂語言技能。

  台語:
    my_belief: >
      台語是台灣多數族群使用的本土語，然而台語卻逐漸面臨語言消失的危機，高比例的學童生活環境缺乏台語的使用。
      學校進行台語教學，希望傳承語言，以語文作為載體留住台灣本土文化。
      透過文學、對話、故事傳說、俗語、真實語境、獨特節慶，讓學生進入台語的思維方式。
    core_goals:
      - 四年長程目標：持續保持學習台語的興趣，累積語彙及台語句型結構，逐年加深生活中運用台語對話的能力。
      - 依據學生狀態，透過對話、唸謠、歌曲、台語詩、故事多元素材引導。
      - 從三年級的「大量聽說」，到四年級「導入閱讀書寫與台羅拼音」，再到五六年級「系統性學習台羅與變調」，最終達成自主閱讀與書寫能力。
    my_approach: >
      整個四年學習歷程分為三個階段：
      【三年級】不進入閱讀及書寫，專注於大量聽與說的練習，建立語感與興趣。
      【四年級】從聽說材料中選取內容，過渡為閱讀與書寫材料，並開始進行初步的台羅系統教學。
      【五、六年級】系統性教學台羅系統，包含字母發音(聲、韻母、鼻化音、入聲字等)、八聲調與變調規則。利用台羅拼音協助認讀漢字，達成「看拼音能發音、看漢字能讀對聲調」的目標。



# 七、語氣錨點（voice_anchor）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 這個段落是 AI 在長對話中「記住你是誰」的關鍵。
# 當對話進行很久，AI 可能會漸漸忘記開場時載入的你的風格與價值觀。
# 這個段落會在需要時被重新讀取，把 AI 拉回「認識你」的狀態。
#
# 填寫建議：用你自己的話，簡短寫下以下幾件事。不需要完美，寫真話就好。

voice_anchor:
  who_i_am: 填空              # 你怎麼定義自己作為教師的核心角色？（1-2 句話）
                               # 例：「我是學生進入世界的嚮導，不是知識的搬運工。」
  my_tone: 填空                # 你說話的風格是什麼？（幾個關鍵詞或一句話）
                               # 例：「溫暖但直接，不繞圈子。」
  my_students: 填空            # 你的學生現在處於什麼發展狀態？（1-2 句話）
                               # 例：「八年級，開始用邏輯質疑一切，需要被認真對待。」
  design_check: 填空           # 你檢查自己課程設計的一句話標準是什麼？
                               # 例：「這堂課有沒有讓學生動手做、用心感受、用腦思考？」

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

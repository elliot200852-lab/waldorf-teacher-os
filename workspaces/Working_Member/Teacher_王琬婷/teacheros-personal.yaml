# 四、你的課堂節奏
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

lesson_structure:
  main_lesson:
    duration: 約 2 小時（08:00-10:20，含晨圈）
    block_length: 2-3 週一個主題區塊
    my_rhythm: 晨圈（詩歌/輪唱/沙包/平衡木）→ 故事回顧 → 新故事/新內容 → 工作本書寫/實作 → 結束
  subject_lesson:
    duration: 40 分鐘
    weekly_sessions: 依科目不同（溼水彩 1 節、閱讀 1 節、導師時間 2 節）
    my_rhythm: null
  morning_circle:
    duration: 20 分鐘（08:00-08:20）
    description: >
      每日節律性開場。內容：詩歌朗誦、輪唱、沙包活動、平衡木、身體律動。
      功能：身體喚醒 + 集體共振 + 為主課程建立準備狀態。
  annual_rhythm:
    autumn: 秋慶路跑或遠足
    winter: 冬季螺旋 / 音樂會
    spring: 隔夜宿營
    summer: 戲劇（創世神話主題）


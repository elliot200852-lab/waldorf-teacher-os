# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teaching_scope:
  grade_focus:
    - 三年級
  subjects:
    - 導師課（全科：語文、數學、自然、溼水彩、閱讀、晨圈）
  grade_development_key: >
    三年級（8-9 歲）：九歲轉變（Rubicon）——孩子開始意識到自己與世界的分離，
    不再有與世界合一的夢境感。內在安全感需要透過創世神話的律法與導引圖像來撫慰，
    同時透過農耕、建築等實作課程，讓孩子真實地進入這個世界。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 三、你的教學信念
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

subject_philosophies:

  homeroom:
    my_belief: >
      導師是孩子在學校中最信賴的成人錨點。
      低年級的權威不是威權，而是孩子願意模仿、願意跟隨的穩定存在。
      透過每日晨圈的節律、故事的餵養、農耕的勞動，
      為孩子建立一個有秩序、可預測、充滿溫暖的世界。
    core_goals:
      - 陪伴孩子順利度過九歲轉變，在分離感中重建內在安全
      - 透過創世神話讓孩子對世界有概略而人性化的整體圖像
      - 透過農耕建築讓孩子體會互助合作，認同自己在團體中的角色
      - 透過認真完成一件工作，建立成就感與自我價值
    my_approach: >
      以故事為核心——每個主課程區塊都從故事展開，
      文字從圖像推導，數學從身體出發，自然從實作體驗。
      晨圈是每天的節律性開場，建立集體共振與身體準備狀態。
      年度節奏清楚：秋慶、冬季螺旋、隔夜宿營、夏季戲劇。

  chinese_literature:
    my_belief: >
      三年級語文的核心是創世神話。
      神話提供了圖像式的故事述說，對應孩子從與世界合一的夢幻步向入世的發展狀態。
      這些故事描述人類如何從神的護佑走向自立，
      呼應孩子開始意識到「自我」與「世界」的分離。
    cultural_approach: >
      基於台灣這塊土地文化的多元性，不只使用西方標準教材，
      而是選擇三套神話系統覆蓋一整年：
      秋季南島神話（海洋性格）→ 冬季舊約（普世性的創世律法）→ 春季山海經（大陸性格）。
      故事文本由我自己蒐集、編寫、改寫。
    teaching_path: >
      一年級：故事 → 從圖像推導文字（部首字）→ 詞 → 簡單句。
      二年級：擴充字量詞量，搭配寓言與聖徒故事。
      三年級：注音拼音 + 字典使用 → 閱讀能力建立 → 關鍵字擴寫 →
      自由書寫（週記、農耕記錄）→ 簡單詞性、段落與標點。

  mathematics:
    my_belief: >
      三年級數學的重點是度量衡與四則運算，
      目的是讓孩子感覺到數學在生活中的真實用途。
    my_approach: >
      先用身體測量，再引入標準單位。
      腕尺、掌尺、指尺、足尺 → 以「步」測量校園 → 公制單位 → 換算。
      讓孩子感受「每個人都有自己的測量方法，每個人對世界的感知都是獨立的」。
      結合生活情境與故事引導（「諾亞方舟有多大？」），再讓孩子實際操作。

  nature_farming_building:
    my_belief: >
      農耕與建築讓孩子瞭解人不是獨自生活，而是需要互助合作。
      透過規律的農務工作培養責任感與意志力，
      從中體會食物得來不易，了解人類對土地的仰賴與責任。
    my_approach: >
      農耕：插秧、巡田水、撿螺、除草、搭棚架、種豆種菜。
      建築：動物築巢 → 神話中的建築 → 人類居所演進 →
      各種建築形態（竹屋、石板屋、土角厝、磚造屋）→ 模型設計與實作 → 實際搭建涼亭。


vocabulary:
- word: light
  phonetic: /lʌɪt/
  primary_definition: Visible electromagnetic radiation. The human eye can typically
    detect radiation (light) in the wavelength range of about 400 to 750 nanometers.
    Nearby shorter and longer wavelength ranges, although not visible, are commonly
    called ultraviolet and infrared light.
  part_of_speech: noun
- word: darkness
  phonetic: /ˈdɑːknəs/
  primary_definition: The state of being dark; lack of light.
  part_of_speech: noun
- word: shade
  phonetic: /ʃeɪd/
  primary_definition: Darkness where light, particularly sunlight, is blocked.
  part_of_speech: noun
- word: dark
  phonetic: /dɑːk/
  primary_definition: Having an absolute or (more often) relative lack of light.
  part_of_speech: adjective
- word: dusk
  phonetic: /dʌsk/
  primary_definition: A period of time at the end of day when the sun is below the
    horizon but before the full onset of night, especially the darker part of twilight.
  part_of_speech: noun
- word: shades
  phonetic: /ʃeɪdz/
  primary_definition: Darkness where light, particularly sunlight, is blocked.
  part_of_speech: noun
- word: black
  phonetic: /blak/
  primary_definition: The colour/color perceived in the absence of light, but also
    when no light is reflected, but rather absorbed.
  part_of_speech: noun
- word: daylight
  phonetic: /ˈdeɪlaɪt/
  primary_definition: The light from the Sun, as opposed to that from any other source.
  part_of_speech: noun
- word: gloom
  phonetic: /ɡlum/
  primary_definition: Darkness, dimness or obscurity.
  part_of_speech: noun
- word: positive
  phonetic: /ˈpɒzɪ̈tɪv/
  primary_definition: A thing capable of being affirmed; something real or actual.
  part_of_speech: noun
- word: shadow
  phonetic: ''
  primary_definition: A dark image projected onto a surface where light (or other
    radiation) is blocked by the shade of an object.
  part_of_speech: noun
- word: twilight
  phonetic: /ˈtwaɪlaɪt/
  primary_definition: The soft light in the sky seen before the rising and (especially)
    after the setting of the sun, occasioned by the illumination of the earth’s atmosphere
    by the direct rays of the sun and their reflection on the earth.
  part_of_speech: noun

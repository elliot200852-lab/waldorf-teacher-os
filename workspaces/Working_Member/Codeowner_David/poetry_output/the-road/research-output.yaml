vocabulary:
- word: road
  phonetic: /ɹəʊd/
  primary_definition: 'A way used for travelling between places, originally one wide
    enough to allow foot passengers and horses to travel, now (US) usually one surfaced
    with asphalt or concrete and designed to accommodate many vehicles travelling
    in both directions. In the UK both senses are heard: a country road is the same
    as a country lane.'
  part_of_speech: noun
- word: route
  phonetic: /ɹʉːt/
  primary_definition: A course or way which is traveled or passed.
  part_of_speech: noun
- word: moving
  phonetic: /ˈmuːvɪŋ/
  primary_definition: To change place or posture; to go, in any manner, from one place
    or position to another.
  part_of_speech: verb
- word: traveling
  phonetic: /ˈtɹæv.l̩iŋ/
  primary_definition: To be on a journey, often for pleasure or business and with
    luggage; to go from one place to another.
  part_of_speech: verb
- word: highway
  phonetic: /ˈhaɪweɪ/
  primary_definition: A motor vehicle for transporting large numbers of people along
    roads.
  part_of_speech: noun
- word: via
  phonetic: /ˈvaɪə/
  primary_definition: A main road or highway, especially in ancient Rome. (Mainly
    used in set phrases, below.)
  part_of_speech: noun
- word: traffic
  phonetic: /ˈtɹæfɪk/
  primary_definition: Pedestrians or vehicles on roads, or the flux or passage thereof.
  part_of_speech: noun
- word: transportation
  phonetic: /tɹænspɔːˈteɪʃən/
  primary_definition: The act of transporting, or the state of being transported;
    conveyance, often of people, goods etc.
  part_of_speech: noun
- word: lane
  phonetic: /leɪn/
  primary_definition: (used in street names) A road, street, or similar thoroughfare.
  part_of_speech: noun
- word: vehicle
  phonetic: /ˈvɪː(ə).kəl/
  primary_definition: A conveyance; a device for carrying or transporting substances,
    objects or individuals.
  part_of_speech: noun

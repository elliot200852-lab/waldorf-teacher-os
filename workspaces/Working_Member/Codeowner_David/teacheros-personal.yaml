    - 人文與社會
    - 歷史
    - 跨領域主題課程

subject_philosophies:
  english:
    my_belief: >
      語言不只是溝通工具，更是「塑造性力量」（Formative Force），
      深刻影響學生的思維方式與靈魂發展。
      英文課不只是技能訓練，而是引導學生進入英語民族的文化靈魂。
    core_goals:
      - 透過聽與讀理解英語，並能以相當流利的口語與書寫自我表達
      - 認識英語民族的性格、習俗、傳統、文學、文化
      - 透過語言學科輔助學生整體發展，拓寬對不同世界觀的洞察
    my_approach: >
      以熱情與幽默面對青春期的質疑，而非壓制。
      培養語言中的判斷力與自主表達能力。
      提供豐富且觸動心靈的文本素材。
      透過創意寫作激發意志力與個性。
      以朗誦、戲劇與故事深化語言的具身體驗。
    teacher_roles:
      - 語言的示範者——以自身對英語的熱情感染學生
      - 文化的橋樑——連結英語世界的靈魂與台灣學生的生命處境
      - 青少年靈魂發展的陪伴者——全面投入學生的經驗、個性與動作

  history:
    my_belief: >
      歷史課不是讓學生「知道過去發生了什麼」，
      而是讓學生透過歷史素材經驗到與自身內在發展相呼應的意識轉變。
      人類整體意識的演化歷程與兒童個人意識的發展平行對應。
    core_goals:
      - 透過生動敘事與傳記式教學讓歷史人物「活過來」
      - 讓學生在情感上與人類歷史經驗產生真實連結
      - 引導學生發展自己的歷史判斷力，而非灌輸標準史觀
    my_approach: >
      從台灣主體意識出發，從台灣人的角度認識世界，
      藉由認識世界進而更了解台灣。
      以全球史觀取代歐洲中心史觀。
      七年級——地理大發現時台灣正是「Formosa」，多元視角敘述。
      八年級——革命與現代化連結台灣日治、二二八、民主化歷程。


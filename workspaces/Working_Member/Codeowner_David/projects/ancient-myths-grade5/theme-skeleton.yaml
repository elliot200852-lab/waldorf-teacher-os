      story_ref: "Story 16"
      block: block-3-babylon
      core_image: "通天塔——人類試圖用建築觸碰天空；巴比倫天文學——六十進制、星座記錄"
      optional: true
      art_response: "黏土工作——通天塔模型 + 星座圖"

    AM017:
      number: 17
      title: "埃及的創世——太陽神拉"
      story_ref: "Story 17"
      block: block-4-egypt
      core_image: "努恩的混沌之水中太陽神拉升起——白天渡過天空，夜晚穿越地下世界"

    # ── 島嶼插曲（台灣原住民神話，獨立故事） ──
    TW01:
      number: 8  # 排序位置：AM007 之後
      title: "島嶼插曲：布農族的射日與創世"
      story_ref: "台灣原住民——布農族"
      block: island-interlude
      core_image: "太古時代有兩個太陽，父子踏上漫長旅途射下其中一個，太陽變成月亮，從此有了晝夜"
      teaching_note: "行動式創世——與印度冥想式創世形成自然對比，但不要強制比較"
      art_response: "濕水彩——兩個太陽，一個被射中後墜落變暗"

    TW02:
      number: 13  # 排序位置：AM011 之後
      title: "島嶼插曲：泰雅族的彩虹橋——善與惡的分界"
      story_ref: "台灣原住民——泰雅族"
      block: island-interlude
      core_image: "只有遵守 gaga（規範）的人死後才能走過彩虹橋回到祖靈身邊；違反者墜落深淵"
      teaching_note: "與波斯的光明/黑暗二元呼應——但泰雅族的善惡是透過行為準則而非宇宙神話來表達"
      art_response: "濕水彩——山谷上方的彩虹橋，一端是祖靈的光"

    TW03:
      number: 19  # 排序位置：AM016 之後
      title: "島嶼插曲：排灣族的百步蛇與秩序之誕生"
      story_ref: "台灣原住民——排灣族"
      block: island-interlude
      core_image: "百步蛇是排灣族的守護者與祖先，頭目家族的紋飾來自蛇紋——社會階層從神話中誕生"
      teaching_note: "與巴比倫的律法/秩序呼應——但排灣族的秩序來自與自然的盟約，不是征服"
      art_response: "蠟塊畫——百步蛇的菱形紋飾，頭目家屋"

    TW04:
      number: 25  # 排序位置：AM021 之後（全課程最後一篇）
      title: "島嶼插曲：達悟族的海——靈魂往何處去"
      story_ref: "台灣原住民——達悟族（蘭嶼）"
      block: island-interlude
      core_image: "達悟族相信靈魂會渡海回到祖先來的地方——海既是生命之源也是死後歸途"
      teaching_note: "與埃及的來世觀呼應——但達悟族的永恆不在金字塔裡，在海浪中"
      art_response: "濕水彩——蘭嶼的海與拼板舟，夕陽中的靈魂之旅"

  # 台灣轉化方向（備課錨點）
  taiwan_approach:
    principle: >
      神話不能替換。印度神話就是印度神話，不能用排灣族神話「取代」。
      做的是對照與呼應，不是等同。
    integration_method: >
      建議在整個 Block 最後一週加入「台灣的古老故事」小區塊（3-5 天），
      讓孩子帶著走過四大文明的視野，回頭看自己腳下這座島嶼上最古老的聲音。
      不是附錄，是回家。
    dont:
      - "不要把台灣原住民神話等同於四大文明神話——規模和歷史脈絡完全不同"
      - "不要在每個文明後面都硬塞一個台灣對照——選擇最自然的幾個切入點即可"
      - "不要把施泰納的意識演化框架直接套在台灣原住民文化上——那是歐洲中心的發展觀"
    cross_cultural_anchors:
      - { kovacs: "摩奴與大洪水", taiwan: "布農族大洪水神話、阿美族海神傳說", angle: "全世界的古老民族都有洪水故事，台灣也有" }
      - { kovacs: "印度種姓制度", taiwan: "排灣族的頭目/貴族/平民社會結構", angle: "不是比較優劣，而是看見人類最初如何組織社會" }
      - { kovacs: "波斯的農耕轉型", taiwan: "布農族小米文化、原住民從狩獵到定居", angle: "人什麼時候開始種東西？" }
      - { kovacs: "巴比倫天文觀測", taiwan: "布農族射日神話、排灣族星辰知識", angle: "仰望同一片天空的不同民族" }
      - { kovacs: "吉爾伽美什的永生追尋", taiwan: "泰雅族彩虹橋——只有遵守 gaga 的人能通過", angle: "不同民族對死後的想像" }
      - { kovacs: "埃及的木乃伊與來世", taiwan: "排灣族祖靈信仰、達悟族靈魂觀", angle: "人死了之後，靈魂去哪裡？" }
      - { kovacs: "埃及尼羅河農業", taiwan: "嘉南大圳、八堡圳", angle: "水如何創造一個世界" }

  # 藝術回應（按文明統整）
  art_by_civilization:
    india: { medium: "濕水彩", activities: "暖色調金黃與紫紅，蓮花意象，曼陀羅圖案" }
    persia: { medium: "蠟塊畫", activities: "光明與黑暗的對比，火焰，農耕場景" }
    babylon: { medium: "黏土工作", activities: "楔形文字泥板、通天塔模型、星座圖" }
    egypt: { medium: "蠟塊畫 + 金色", activities: "金字塔、尼羅河、鷹頭荷魯斯、死者之書圖像" }

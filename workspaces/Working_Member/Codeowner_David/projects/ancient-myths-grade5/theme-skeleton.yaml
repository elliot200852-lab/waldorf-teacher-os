    AM018:
      number: 18
      title: "拉的秘密名字"
      story_ref: "Story 18"
      block: block-4-egypt
      core_image: "伊西斯用蛇咬傷拉，迫使他說出秘密名字——知道名字就是掌握力量"
      teaching_note: "語言與命名的魔法力量"
      art_response: "蠟塊畫——蛇與太陽神的對峙"

    AM019:
      number: 19
      title: "賽克邁特的恐怖"
      story_ref: "Story 19"
      block: block-4-egypt
      core_image: "拉派獅頭女神賽克邁特懲罰人類——她殺紅了眼，眾神用紅色啤酒灌醉她才阻止屠殺"
      teaching_note: "神的力量可以保護也可以毀滅"
      art_response: "蠟塊畫——獅頭女神的金色與紅色"

    AM020:
      number: 20
      title: "奧西里斯與伊西斯（一）"
      story_ref: "Story 20-21"
      block: block-4-egypt
      core_image: "仁慈的國王奧西里斯被弟弟賽特殺害肢解——伊西斯走遍全埃及收集遺體"
      art_response: "蠟塊畫——伊西斯展開翅膀的經典意象"

    AM021:
      number: 21
      title: "奧西里斯與伊西斯（二）——荷魯斯復仇"
      story_ref: "Story 20-21"
      block: block-4-egypt

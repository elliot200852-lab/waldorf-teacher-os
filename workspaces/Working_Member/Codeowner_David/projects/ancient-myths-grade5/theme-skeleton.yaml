# 五年級古文明神話主課程骨架
# 同步自 theme-skeleton.md v1.0（Downloads 版）
ancient_myths_skeleton:
  source: "Charles Kovacs, Ancient Mythologies: India, Persia, Babylon, Egypt (Wynstones Press, 184 pp, 21 stories)"
  target_grade: 5
  total_stories: 25
  steiner_framework: "從亞特蘭提斯到金字塔——追蹤人類意識從夢境般的神話思維走向清醒的歷史思維"
  status: "Theme Skeleton——基於公開資訊重建的主題弧線，章節劃分與故事細節待原書確認"

  consciousness_arc:
    india: { stage: "夢境意識", image: "向內（冥想）", child_parallel: "孩子剛離開童年的夢境，開始察覺自我" }
    persia: { stage: "二元覺醒", image: "向下（耕地）", child_parallel: "孩子開始感受善惡、對錯的張力" }
    babylon: { stage: "星辰智慧", image: "向上（觀星）", child_parallel: "孩子的思考力開始結構化，對規則感興趣" }
    egypt: { stage: "死亡與永生", image: "向前（追問來世）", child_parallel: "孩子第一次真正意識到死亡，也第一次渴望永恆" }

  blocks:
    block-1-india:
      name: "古印度"
      story_range: "Story 1-7"
      estimated_stories: "5-6（Story 7 佛陀為可選）"
      core_theme: "人類最初的精神家園——物質世界是幻象，真正的實在是精神世界"

    block-2-persia:
      name: "古波斯"
      story_range: "Story 8-11"
      estimated_stories: "3-4（Story 11 東方智者為可選）"
      core_theme: "從夢境中醒來面對大地——光明與黑暗的對抗，人從冥想者變成勞動者"

    block-3-babylon:
      name: "古巴比倫/美索不達米亞"
      story_range: "Story 12-16"
      estimated_stories: "4-5（Story 16 巴別塔為可選）"
      core_theme: "仰望星空建造城市——觀測星辰、發明文字與法律、追問死亡"

    block-4-egypt:
      name: "古埃及"
      story_range: "Story 17-21"
      estimated_stories: "5-6"
      core_theme: "面對死亡追求永恆——金字塔、木乃伊、死者之書"

    island-interludes:
      name: "島嶼插曲"
      story_range: "TW01-TW04"
      estimated_stories: "4（分散於文明轉換點）"
      core_theme: "台灣這座島嶼上最古老的聲音——不是附錄，是回家"

  # 故事清單——部分故事跨 2 課，ID 以 Story 編號為準
  # 標註 (optional) 的故事可能不在 Kovacs 原書中，或可根據教學需要選擇
  lessons:
    AM001:
      number: 1
      title: "創世與最初的人類（一）"
      story_ref: "Story 1-2"
      block: block-1-india
      core_image: "梵天的創造——從宇宙蛋或蓮花中誕生世界"
      teaching_note: "[待確認] Kovacs 是否在此先講 Atlantis 作為序幕"
      art_response: "濕水彩——暖色調金黃與紫紅，蓮花意象"

    AM002:
      number: 2
      title: "創世與最初的人類（二）"
      story_ref: "Story 1-2"
      block: block-1-india
      core_image: "印度教三位一體：梵天（創造）、毗濕奴（維護）、濕婆（毀滅）"
      art_response: "濕水彩——三種色彩的交融與循環"

    AM003:
      number: 3
      title: "摩奴與大洪水"
      story_ref: "Story 3-4"
      block: block-1-india
      core_image: "摩奴的故事——洪水與人類的重新開始"
      teaching_note: "不是為種姓制度辯護，而是讓孩子理解最早的社會秩序來自「每個人有自己的位置」這個原始直覺"
      art_response: "濕水彩——洪水的藍色漫延與一艘小船"

    AM004:
      number: 4
      title: "種姓制度與聖牛"
      story_ref: "Story 3-4"
      block: block-1-india
      core_image: "摩奴的法典——婆羅門、剎帝利、吠舍、首陀羅；聖牛的神聖性"
      art_response: "蠟塊畫——四種色彩代表四個種姓"

    AM005:
      number: 5
      title: "摩訶婆羅多——般度五子"
      story_ref: "Story 5"
      block: block-1-india
      core_image: "般度五兄弟的冒險——正義與不義的鬥爭，克里希納作為指引者"
      art_response: "蠟塊畫——五兄弟的剪影"

    AM006:
      number: 6
      title: "羅摩與悉多"
      story_ref: "Story 6"
      block: block-1-india
      core_image: "羅摩營救被魔王拉瓦納劫走的妻子悉多——忠誠、勇氣、犧牲；猴神哈奴曼的協助"
      teaching_note: "印度最核心的善戰勝惡敘事，排燈節的故事背景"
      art_response: "蠟塊畫——森林中的羅摩與猴王哈奴曼"

    AM007:
      number: 7
      title: "佛陀"
      story_ref: "Story 7"
      block: block-1-india
      core_image: "悉達多太子離開宮殿，看見老、病、死——菩提樹下的覺悟"
      teaching_note: "[待確認] 有些華德福教師將佛陀放在語文課而非歷史課"
      optional: true
      art_response: "濕水彩——從金色宮殿走向簡樸的林蔭"

    AM008:
      number: 8
      title: "阿胡拉·馬茲達與阿里曼（一）"
      story_ref: "Story 8-9"
      block: block-2-persia
      core_image: "光明之神與黑暗之神的永恆戰鬥——人類的責任是站在光明這一邊"
      teaching_note: "人類歷史上最早的一神教之一，後來猶太教、基督教、伊斯蘭教的重要影響源頭"
      art_response: "蠟塊畫——金色光焰與深紫黑暗的對峙"

    AM009:
      number: 9
      title: "阿胡拉·馬茲達與阿里曼（二）"
      story_ref: "Story 8-9"
      block: block-2-persia
      core_image: "善思善言善行——透過勤勞工作對抗黑暗"
      art_response: "蠟塊畫——光明與黑暗的對比，火焰，農耕場景"

    AM010:
      number: 10
      title: "瑣羅亞斯德"
      story_ref: "Story 10"
      block: block-2-persia
      core_image: "先知在曠野中接受啟示——聖典《阿維斯陀》；從遊牧到農耕的轉型"
      art_response: "蠟塊畫——荒野中的火焰與先知的剪影"

    AM011:
      number: 11
      title: "波斯的智者"
      story_ref: "Story 11"
      block: block-2-persia
      core_image: "東方三博士的原型——波斯新年 Nowruz，春天戰勝冬天"
      optional: true
      art_response: "濕水彩——夜空中的星星與三個行走的身影"

    AM012:
      number: 12
      title: "馬爾杜克的創世"
      story_ref: "Story 12"
      block: block-3-babylon
      core_image: "馬爾杜克斬殺混沌女神提亞瑪特，用她的身體創造天地——秩序從戰鬥中誕生"
      teaching_note: "與印度的和平創世形成對比——巴比倫的世界是從戰鬥中誕生的"
      art_response: "蠟塊畫——巨龍與英雄的搏鬥"

    AM013:
      number: 13
      title: "吉爾伽美什（一）——英雄與野人"
      story_ref: "Story 13-14"
      block: block-3-babylon
      core_image: "烏魯克國王吉爾伽美什與恩奇都的友誼——野人被文明化，殺死森林守護者洪巴巴"
      art_response: "蠟塊畫——城牆內的王與荒野中的野人"

    AM014:
      number: 14
      title: "吉爾伽美什（二）——追尋永生"
      story_ref: "Story 13-14"
      block: block-3-babylon
      core_image: "恩奇都之死→渡過死亡之水→永生草被蛇偷走——人類終究無法逃避死亡"
      teaching_note: "人類文學史上最古老的史詩。核心問題：「人為什麼會死？」"
      art_response: "濕水彩——黑色的死亡之水與遠方的光"


  confirmed_decisions:
    - "課程結構：臺中 1 週 + 臺南 2 週 + 高雄 1 週 = 4 週 8 節"
    - "臺中篇文本：楊逵〈和平宣言〉+ 楊双子〈大麵羹〉（主）+ 楊双子〈豐仁冰〉（課後閱讀）"
    - "教學順序反轉：先大麵羹（具體、感官）→ 再和平宣言（抽象、歷史）"
    - "課堂學習單（上課用）+ 課後學習單（功課，四選一差異化任務）"
    - "豐仁冰不進課堂，作為自主閱讀，下週或導師課收尾"
    - "臺南篇文本：葉石濤散文引文（6 站）＋ 許丙丁《小封神》台語原文＋註解"
    - "臺南篇走讀範圍：臺南火車站→民生綠園→老街→赤崁樓→孔廟"
    - "臺南篇設計模式延續臺中篇：身體入口→懸疑轉場（24/30+）→朗讀儀式→四選一差異化"
    - "臺南篇課後任務 A 降低門檻：從 600 字宣言改為 300 字記憶策展人＋紀念牌設計"
    - "Week 6 學習單重設計：加入暖身/聯語/諺語（一府二鹿三艋舺、葉石濤語錄、祀典武廟聯語）；Part 2 地名只列不描述；Part 3 空白地圖課後 Google Maps 作業"
    - "Week 8 分組報告結構：歌曲 30 秒 + 葉石濤 2 分鐘 + 許丙丁 2 分鐘 + 各組創意 2 分鐘"
    - "教學反思：一次放太多任務，學生缺框架容易迷路；Week 8 需設明確節點，一次推進一件事"

  week1_teaching_log:

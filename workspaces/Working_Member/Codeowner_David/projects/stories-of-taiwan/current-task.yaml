connection_to_previous: "前一篇 A009 講了十三行人的冶鐵技藝（史前最早的足跡），A010 轉向各族的土地故事，聚焦排灣族的石板屋文明、百步蛇圖騰與貴族制度，展現臺灣原住民文化的多樣性。"

narrative_angle: >
  從一塊石板出發——排灣族用山上的石板蓋起了世代相傳的家。
  石板屋不只是房子，是族群的記憶、祖先的守護，也是貴族與平民身分的象徵。
  百步蛇為何成為排灣族的守護神？琉璃珠為何比黃金更珍貴？
  在這片林木蒼翠的山地，一個擁有嚴密階層的民族，如何在山中建立起自己的文明？

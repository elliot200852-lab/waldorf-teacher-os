# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TeacherOS — Access Control List（使用者權限註冊表）
# 路徑：ai-core/acl.yaml
# 維護者：David（唯一有權修改此檔案的人）
# 受保護：.github/CODEOWNERS 確保任何修改都需要 David 的 GitHub 審核
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 用途：
#   1. AI 在每次工作開始時讀取此檔案，確認使用者身份與授權範圍。
#   2. Pre-commit Hook（setup/hooks/pre-commit）讀取此檔案，
#      在 git commit 時攔截超出授權的修改。
#
# 新增老師步驟：
#   1. 在 teachers 清單中複製範例格式，填入真實資料。
#   2. 在 GitHub 合併後生效（需要 David 審核此檔案的 PR）。
#
# Workspace 命名規則：{身份}_{真實姓名}
#   - Codeowner_{Name}：系統管理員（擁有合併權限）
#   - Teacher_{Name}：一般教師
#   所有教師 workspace 位於 workspaces/Working_Member/ 下
#   工作範例參考 為特殊命名，不套 Role_Name 格式
#
# 最後更新：2026-03-10

# ── 管理員（無限制）────────────────────────────────────

roles:

  admin:
    - name: 林信宏（David）
      email: elliot200852@gmail.com
      github_username: elliot200852-lab
      role: 系統管理員（Codeowner）兼華德福教師
      workspace: workspaces/Working_Member/Codeowner_David/
      allowed_paths:
        - "*"                              # 最高權限，無任何路徑限制

# ── 試用教師（依班級授權）──────────────────────────────
#
# 新增格式（複製下方註解區塊，移除 # 符號並填入資料）：
#
#   - name: 老師姓名
#     email: teacher@school.edu.tw        # 對應 setup/environment.env 的 USER_EMAIL
#     github_username: github-username    # 用於 CODEOWNERS 追蹤
#     workspace: workspaces/teacher-id/  # 此老師的個人工作區路徑
#     allowed_paths:
#       - projects/class-4c/             # 授權修改的班級資料夾
#       - workspaces/teacher-id/         # 授權修改自己的 workspace（100% 自由）
#     blocked_paths:                     # 明確禁止的路徑（可選，補強說明用）
#       - ai-core/
#       - setup/
#       - .github/

  teachers:
    # ── Workspace 建立流程 ──
    # 1. 新教師提供：姓名、Email、班級代碼、科目

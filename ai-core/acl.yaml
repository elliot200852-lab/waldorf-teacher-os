# ── 永遠受保護的核心路徑（任何 Teacher 角色均不得修改）──
#
# 這些路徑即使不在 blocked_paths 中也永遠受到保護。
# 修改這些路徑的 PR 在 GitHub 上必須由 David 審核。

protected_always:
  - ai-core/acl.yaml                    # 本文件——權限的根基
  - ai-core/teacheros.yaml              # 系統路由中樞
  - ai-core/teacheros-foundation.yaml   # 華德福教育共用根基（所有教師共讀）
  - ai-core/reference/                  # 教學哲學完整參考文件
  - .github/CODEOWNERS                  # GitHub 審核規則
  - .github/                            # 整個 GitHub 設定資料夾
  - setup/hooks/                        # Hook 腳本
  - publish/build.sh                    # 輸出腳本

# ── 共用可寫路徑（所有已註冊使用者均可修改）────────────
#
# 這些路徑由系統技能（obsidian-sync、wrap-up 等）自動維護。
# 任何已登記於 acl.yaml 的使用者（admin 或 teacher）都可以修改。
# 用途：避免自動化技能修改共用檔案時被 pre-commit 攔截。
#
# 新增路徑時只需在此清單加一行，不需修改 hook 或個別教師的 allowed_paths。

shared_writable:
  - Good-notes/                     # 共享筆記區（所有註冊教師可新增與編輯）

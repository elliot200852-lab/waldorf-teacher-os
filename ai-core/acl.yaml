    # 3. 腳本自動：寫入 acl.yaml + 建立 workspace + 複製模板
    # 4. 管理員 commit + push，教師 pull 即可使用
    #
    # 新增格式（複製下方範例，修改相關欄位）：
    #   - name: 老師姓名
    #     email: teacher@school.edu.tw
    #     github_username: github-username
    #     workspace: workspaces/Working_Member/Teacher_{教師姓名}/
    #     allowed_paths:
    #       - workspaces/Working_Member/Teacher_{教師姓名}/
    #     blocked_paths:
    #       - ai-core/
    #       - setup/
    #       - .github/


# TeacherOS Agent Sync Spec
# 定義系統預期狀態，供 sync_check.py 驗證一致性
# 維護者：David | 最後更新：2026-03-25

version: "1.1"

# --- 核心系統檔案（必須存在） ---
system_files:
  - ai-core/AI_HANDOFF.md
  - ai-core/teacheros.yaml
  - ai-core/teacheros-foundation.yaml
  - ai-core/acl.yaml
  - ai-core/skills-manifest.md
  - ai-core/skills/README.md
  - projects/_di-framework/project.yaml

# --- Skill 定義 ---
# required_frontmatter: 每個 skill .md 必須包含的 YAML frontmatter 欄位
skills:
  canonical_path: ai-core/skills
  claude_commands_path: .claude/commands
  required_frontmatter:
    - name
    - description
    - triggers
  expected_skills:
    # 核心流程
    - opening
    - load
    - status
    - syllabus
    - lesson
    - wrap-up
    - block-end
    - di-check
    - ref
    # 教學設計
    - lesson-engine
    - english-45
    - rhythm
    - homeroom
    # 學生與家長
    - student-note
    - parent-letter
    - teaching-log
    # 臺灣的故事管線
    - story-daily
    - story-planner
    - story-research
    - story-writer
    - story-verify
    - story-archive
    # 素材研究
    - poetry-research
    - art-in-teaching
    # 輸出與美化
    - beautify
    - new-doc
    - video
    - video-setup
    - teach-animation
    # Google Workspace
    - calendar
    - drive
    - sheets
    - docs-edit
    - send-email
    - gws-setup
    - gws-bridge
    # 系統維護
    - obsidian-sync
    - sync-cowork
    - sync-agents
    - pull-request
    - add-teacher
    - check-compat
    - yt-subtitle
    - git-history
    # 專案特定
    - botany-daily
    - niamyio
    - ancient-myths-daily

# --- Reference 知識模組 ---
reference_modules:
  path: ai-core/reference
  expected_files:
    - pedagogy-framework.yaml
    - subject-english.yaml
    - subject-history.yaml
    - student-development.yaml

# --- Claude Command 路由格式 ---
claude_command_format:
  # 每個 .claude/commands/*.md 應包含的內容模式
  must_contain: "ai-core/skills/"
  # 說明：Claude commands 是 thin routing layer，必須指向 canonical skill 路徑

# TeacherOS Agent Sync Spec
# 定義系統預期狀態，供 sync_check.py 驗證一致性
# 維護者：David | 最後更新：2026-03-19

version: "1.1"

# --- 核心系統檔案（必須存在） ---
system_files:
  - ai-core/AI_HANDOFF.md
  - ai-core/teacheros.yaml
  - ai-core/teacheros-foundation.yaml
  - ai-core/acl.yaml
  - ai-core/skills/skills-manifest.md
  - ai-core/skills/README.md
  - projects/_di-framework/project.yaml

# --- Skill 定義 ---
# required_frontmatter: 每個 skill .md 必須包含的 YAML frontmatter 欄位
skills:
  canonical_path: ai-core/skills
  claude_commands_path: .claude/commands
  required_frontmatter:
    - name
    - description
    - triggers
  expected_skills:
    # A. 系統營運
    - opening
    - load
    - status
    - wrap-up
    - obsidian-sync
    # B. 教學核心
    - syllabus
    - lesson
    - subject-lesson-45
    - english-45          # 覆蓋層（非獨立技能，由 subject-lesson-45 引擎載入）
    - rhythm
    - block-end
    - di-check
    - ref
    # C. 備課素材
    - poetry-research
    - art-in-teaching
    - beautify
    - yt-subtitle
    - teach-animation
    - video
    # D. 導師與學生
    - homeroom
    - student-note
    - teaching-log
    - parent-letter
    # E. 外部服務
    - send-email
    - drive
    - calendar
    - sheets
    - docs-edit
    - gws-setup
    # F. 系統工程
    - add-teacher
    - pull-request
    - sync-agents
    - sync-cowork
    - git-history

# --- Reference 知識模組 ---
reference_modules:
  path: ai-core/reference
  expected_files:
    - pedagogy-framework.yaml
    - subject-english.yaml
    - subject-history.yaml
    - student-development.yaml

# --- Claude Command 路由格式 ---
claude_command_format:
  # 每個 .claude/commands/*.md 應包含的內容模式
  must_contain: "ai-core/skills/"
  # 說明：Claude commands 是 thin routing layer，必須指向 canonical skill 路徑

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TeacherOS Reference — 施泰納教學方法論（B 層，按需載入）
# 路徑：ai-core/reference/steiner-pedagogy-methods.yaml
# 來源：GA 293（Study of Man）+ GA 294（Practical Advice to Teachers）
# 觸發：任何課程設計工作、lesson-engine.md 執行時
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 本文件是從施泰納教師培訓講座（1919）中提取的方法論錨點，
# 供 AI 在課程設計時作為硬性約束參照。
# 完整研究報告見：
#   - ai-core/reference/steiner-study-of-man-research.md（GA 293）
#   - ai-core/reference/steiner-practical-advice-research.md（GA 294）
#   - ai-core/reference/ga293-294-teacheros-integration.md（整合方案）
#
# 年級發展完整 profiles 見：ai-core/reference/pedagogy-framework.yaml

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 一、同感-反感極性（Sympathy-Antipathy Polarity）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

sympathy_antipathy:
  source: GA 293 L2、L5
  description: >
    貫穿施泰納心理學最基礎的動力學模型。
    同感與反感不是日常情緒，而是構成所有心理活動的原初力量。
  polarity:
    antipathy:
      direction: 指向出生前（Pre-natal）
      chain: 反感 → 心像 → 記憶 → 概念
      nature: 認知力量，弱化靈性認知為可操作的心像
    sympathy:
      direction: 指向死後（Post-mortem）
      chain: 同感 → 想像 → 感官知覺 → 意志行動
      nature: 意志力量，連結靈性發展的未來種子
  balance: >
    客觀知覺 = 同感與反感的精確均衡。
    動物在感官中有更強的同感（本能連結），
    人類發展出更多反感——這是人格形成與意識分離的基礎。
  teaching_implication:
    image_teaching: >
      圖像式教學啟動同感與意志，指向兒童的未來發展。
      在兒童心中種下的圖像是「胚芽、種子」，促進持續的生成與發展。
    abstract_teaching: >
      抽象概念啟動反感與記憶，過度使用會導致身體硬化。
      低年級應以圖像為主，高年級才逐步增加概念密度。
    moral_education: >
      道德發展需透過培養適當的反感來實現。
      兒童天然從同感出發行動；道德理想引入必要的反感，防止純粹本能行為。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 二、三元意識論（Threefold Consciousness）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

threefold_consciousness:
  source: GA 293 L6
  description: >
    即使在清醒生活中，人類同時活在三種意識狀態中。
    這不是比喻——意志活動在意識層面等同於深度睡眠。
  states:
    thinking:
      consciousness: 完全清醒
      description: 人只有在思考時才是真正清醒的
    feeling:
      consciousness: 做夢
      description: 情感經驗處於半意識，類似夢境
    willing:
      consciousness: 沉睡
      description: 就我們作為意志存在而言，即使在清醒時我們也是沉睡的
  teaching_implication: >
    教師面對的不是一個統一的「清醒」學生，
    而是一個同時清醒、做夢與沉睡的複合存在。
    愛做夢的（感覺主導）兒童需要強烈的情感投入來喚醒思考。
    看似遲鈍的兒童可能擁有強大但休眠的意志能力，
    需要以運動為基礎的活動而非智識取向。
  triad_teaching_approach:
    thinking: 透過閱讀/書寫揭示意義
    feeling: 透過不過早分析意義的吸收來發展
    willing: 透過不刻意尋找意義的活動（重複行動）來發展

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 三、十二感官體系（Twelve Senses）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

twelve_senses:
  source: GA 293 L8
  description: >
    施泰納識別出十二種感官，遠超傳統五感。
    同等關注地發展所有十二種感官至為重要。
  categories:
    will_senses:
      name: 意志感官
      senses: [觸覺, 生命感, 運動感, 平衡感]
      note: 運作時大部分處於無意識狀態
    feeling_senses:
      name: 感覺感官
      senses: [嗅覺, 味覺, 視覺, 溫暖感]
    knowledge_senses:
      name: 認知感官
      senses: [自我感, 思想感, 聽覺, 語言感]
      note: >
        自我感（Ego sense）使人能直接感知他人的自我，
        涉及節律性的同感-反感震盪。
        思想感獨立於語言感知他人的思想。
  teaching_implication: >
    記憶的力量必須從感覺和意志中引出，而不是從純粹的智識記憶練習中。
    課程設計應觸及多種感官，不可只服務認知感官。
    低年級尤須重視意志感官（運動、平衡、觸覺）的發展。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 四、語言教學法
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

language_teaching:
  source: GA 294 L2、L4、L5、L9
  principles:
    vowels_and_consonants:
      vowels: 表達內在情感回應（A=敬畏，O=驚嘆，U=恐懼，E=抵抗，I=趨近）
      consonants: 模仿外在事物及其形態
      implication: 母音從感覺體驗推導，子音從繪畫/圖像推導
    reading_writing_sequence:
      order: 繪畫 → 手寫 → 閱讀手寫體 → 閱讀印刷體
      principle: 先整體體驗，再分析局部（從整體到部分）
      detail: >
        先畫具體圖像（如魚的形狀）→ 提取聲音元素 →
        展示如何簡化為字母形式 → 最後引入約定俗成的書寫符號
    grammar_teaching:
      method: 文法從活生生的對話中有機浮現，而非以學究方式呈現規則
      development: 非人稱活動（「下雨了」）→ 主語浮現（「草地在發綠」）→ 概念形成（「綠色的草地」）
      timing: 句法教學在十二歲後才正式開始，之前靠本能吸收語言結構
    foreign_language:
      economy: 排除過度翻譯，以大量閱讀（準確發音）+ 自由口頭覆述取代
      multilingual: 同時教授多種語言能創造強大的相互強化
      progression: 九歲前口頭沉浸 → 九至十二歲引入文法 → 十二至十四歲擴展到句法與實用溝通
    grammar_examples: >
      文法範例應被刻意忘記——口頭練習但不寫入筆記本。
      讓規則保持意識，防止對表面形式的死記。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 五、道德教育時機
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

moral_education:
  source: GA 294 L14
  core_principle: >
    道德教育必須源自感覺與自然發展，而非外部規則。
    在錯誤的發展階段教導實踐道德會適得其反。
  timing:
    age_7_to_9:
      state: 兒童擁有健康的本能自然引導行為
      warning: 此時教自我照顧反而有害——抽象知識會製造自私
    age_9_to_12:
      state: 本能與判斷之間的平衡期
      opportunity: 教授營養與健康的最佳時期
    age_12_to_14:
      state: 理性判斷浮現
      opportunity: 教商業算術與金融概念不會產生自我中心
  method: >
    「如果你在教學的每一步都附上一定的感覺」，道德發展就會持續一生——
    不是透過規則，而是透過活生生的體驗。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 六、教師的三力量與四支柱
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

teacher_qualities:
  three_forces:
    source: GA 293 L14
    motto: >
      「讓你自己充滿想像力的力量，擁有面對真理的勇氣，
      磨礪你對靈魂責任的感受。」
    forces:
      imagination: 在所有課程中保持想像力的鮮活，每年以嶄新方式重新塑造教材
      truth: 追求真理的勇氣，防止唯物主義思維造成的靈魂怠惰
      responsibility: 對真理與學生發展的道德義務
  four_pillars:
    source: GA 294 結語
    pillars:
      initiative: 教師在整體與細節上都必須是「一個有主動性的個人」
      universal_interest: 對「世界生活與人類生活的每一個面向」保持廣泛的好奇心
      truth_integrity: 教師必須是「一個絕不與不真實達成交易的人」
      spiritual_vitality: 教師「不能枯萎、不能變酸」，必須保持「靈魂的新鮮氣質」
  teacher_ontology:
    source: GA 293 L1
    principle: >
      教師對學生的影響，根本上不是透過他做了什麼（技巧），
      而是透過他是什麼（存在品質）。
      教師培養對人類發展的特定思維模式，
      這種內在工作直接影響課堂的靈性氛圍。
  warning: >
    「學究氣與教學是根本不相容的。」
    教師若察覺自己的學究氣正在浮現，必須有意識地抵抗。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 七、藝術性作為教學基底
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

art_as_foundation:
  source: GA 294 L1、L3
  principle: >
    不是「在課程中加入藝術」，而是「所有教學都是藝術性的」。
    藝術投入「整個人」而非僅「頭部的人」。
    藝術以智識內容無法做到的方式強化意志。
  polarity:
    visual_sculptural: 造形藝術讓死的物質活過來（同感力量）
    musical_poetic: 音樂帶來過剩的生命力需要被節制（反感力量的引入）
    integration: 優律思美（Eurhythmy）在更高層次統合兩極
  implication: >
    概念性思考單獨運作會創造「正在死去的意識」。
    所有教學都必須沉浸在藝術性元素中。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 八、呼吸與節奏作為教育的生理學基礎
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

breathing_rhythm:
  source: GA 293 L1、GA 294 L2
  principle: >
    教育的首要任務之一是將呼吸節奏與神經-感官系統和諧化。
    呼吸是外在物質世界與人類之間最重要的中介者。
  cosmic_correspondence: >
    每分鐘 18 次呼吸 → 每日 25,920 次 → 與柏拉圖年（歲差週期）的年數相同。
    人類在不同尺度上體現宇宙過程。
  lesson_rhythm: >
    課堂節奏（吸氣-呼氣）的理論依據：
    接收性活動（聆聽、觀看）= 吸氣；
    表達性活動（說話、書寫、運動）= 呼氣。
    兩者必須交替出現，不可長時間停留在同一極。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 九、發展時機的精確對應
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

developmental_timing:
  source: GA 293 L9、GA 294 L7-L8
  milestones:
    tooth_change:
      age: 約 7 歲
      event: 塑造性的以太力量從建構物質體的任務中釋放，可用於學習與記憶
      implication: 正式教育的起點
    rubicon:
      age: 約 9 歲
      event: 自我與世界的分離感首次浮現，兒童開始覺察自己是獨立的「我」
      implication: 課程從圖像沉浸轉向主客分離的探索（農耕、建造、創世故事）
    twelve_year_change:
      age: 約 12 歲
      event: 星芒體滲透以太體，因果思考能力萌發
      implication: 歷史從敘事轉向因果分析，物理從外部現象擴展到人體系統
    puberty:
      age: 約 14 歲
      event: 星芒體誕生，獨立思考萌發
      implication: 抽象判斷力開始可用，但仍需圖像作為概念的入口
  warning: >
    在錯誤的發展階段引入特定內容會造成反效果。
    教學時機的精確性是華德福教育方法論的核心。

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 十、從整體到部分（Whole-to-Part）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

whole_to_part:
  source: GA 294 L1、L5
  principle: >
    貫穿全部教學的根本方法論：先呈現整體，再分析局部。
    這對應同感-反感理論：整體知覺啟動同感（生命力量），
    分析啟動反感（智識力量）。
  applications:
    arithmetic: 從總和到加數（先 24，再分為 9+5+7+3）
    reading: 從圖像到字母（先整篇體驗，再逐段分析）
    natural_history: 從人到動物（人類是其他自然界在更高層面的綜合）
    geography: 從直接環境到遠方
    history: 先敘事全貌，再提取因果
    science: 先觀察完整現象，再抽取規律

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 十一、超越即時理解的教學
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

beyond_immediate_understanding:
  source: GA 294 L3
  principle: >
    施泰納主張引入兒童尚無法完全理解的概念，讓理解在日後「成熟」。
    他批判現代原則「只教孩子當下能理解的東西」。
  teaching_implication: >
    創造期待而非立即教導。留下兒童對未來學習的期待，
    比立即呈現更能刺激意志發展。
    在兒童心中種下的圖像是種子，不需要當下被完全理解。

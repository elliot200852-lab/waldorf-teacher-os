# ════════════════════════════════════════════════════════════════════════
# repo-structure-map.yaml — Repo 架構地圖
# ════════════════════════════════════════════════════════════════════════
#
# 三大區段：
#   rules            — 路徑模式 → HOME.md 區段（first-match-wins）
#   sections         — HOME.md 完整區段樹（forward validation）
#   tracked_directories — git-tracked 目錄（backward validation，自動重建）
#
# 匹配策略：從上往下比對 rules，命中第一條就停。
# glob 語法：* 匹配單層、** 匹配多層（Python 3.12+ PurePath.match）
#
# 維護方式：
#   - 新增路由：手動編輯 rules
#   - 重建 tracked_directories：python3 setup/scripts/map-validate.py --rebuild-dirs
#   - 驗證完整性：python3 setup/scripts/map-validate.py --validate
# ════════════════════════════════════════════════════════════════════════

_meta:
  version: "1.0.0"
  match_strategy: first-match-wins
  description: "路徑 → HOME.md 區段的路由規則（取代 obsidian-sync Step 4 嵌入表格）"


# TeacherOS 跨平台指令公約
# AI agent 在執行技能時，依 OS 選用對應指令。
# 技能文件（.md）以 bash 為主寫法，Windows 不相容指令必須附 PowerShell 版。

platform_detection:
  bash: "uname -s"
  powershell: "$PSVersionTable.OS"

command_map:
  check_command:
    bash: "command -v {cmd}"
    powershell: "Get-Command {cmd} -ErrorAction SilentlyContinue"

  env_prefix:
    description: "設定環境變數後執行指令"
    bash: "VAR=value command"
    powershell: |
      $env:VAR = "value"
      command

  mkdir:
    bash: "mkdir -p {path}"
    powershell: "New-Item -ItemType Directory -Force -Path {path}"

  copy_file:
    bash: "cp {src} {dest}"
    powershell: "Copy-Item {src} {dest}"

  open_browser:
    macos: 'open "{url}"'
    linux: 'xdg-open "{url}"'
    windows: 'Start-Process "{url}"'

  config_dir:
    macos_linux: "~/.config/"
    windows: "$env:APPDATA\\"

  home_dir:
    bash: "$HOME"
    powershell: "$env:USERPROFILE"

  python:
    macos_linux: "python3"
    windows: "python3 或 python（取決於安裝方式）"
    detection: |
      先嘗試 python3，若不存在再嘗試 python，
      確認版本 >= 3.8

  grep_pattern:
    description: "跨平台建議：改用 Python 處理"
    bash: "grep -E '{pattern}' {file}"
    powershell: "Select-String -Pattern '{pattern}' -Path {file}"
    python: "import re; re.search(pattern, text)"

  sed_replace:
    description: "跨平台建議：改用 Python 處理"
    bash: "sed -i 's/{old}/{new}/g' {file}"
    powershell: "(Get-Content {file}) -replace '{old}','{new}' | Set-Content {file}"
    python: "pathlib.Path(file).read_text().replace(old, new)"

skill_writing_rules:
  - 技能文件（.md）中的 shell 指令以 bash 為主寫法
  - Windows 不相容的指令必須附上 PowerShell 版本（雙代碼區塊）
  - 不相容指令清單：command -v、ENV=val cmd、mkdir -p、cp、open URL、uname、chmod、grep、sed、awk
  - 跨平台的指令不需要雙寫：git、node、npm、npx、python3、pip
  - 新建腳本一律用 Python 3，不用 bash
  - 既有 .sh 腳本逐步遷移為 .py

hook_convention:
  description: "Git hooks 使用 shell 薄層呼叫 Python"
  example: |
    #!/bin/sh
    python3 "$(dirname "$0")/../../setup/scripts/pre-commit-check.py"

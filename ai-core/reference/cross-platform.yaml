# TeacherOS 跨平台指令公約
# AI agent 在執行技能時，依 OS 選用對應指令。
# 技能文件（.md）以 bash 為主寫法，Windows 不相容指令必須附 PowerShell 版。

platform_detection:
  bash: "uname -s"
  powershell: "$PSVersionTable.OS"

command_map:
  check_command:
    bash: "command -v {cmd}"
    powershell: "Get-Command {cmd} -ErrorAction SilentlyContinue"

  env_prefix:
    description: "設定環境變數後執行指令"
    bash: "VAR=value command"
    powershell: |
      $env:VAR = "value"
      command

  mkdir:
    bash: "mkdir -p {path}"
    powershell: "New-Item -ItemType Directory -Force -Path {path}"

  copy_file:
    bash: "cp {src} {dest}"
    powershell: "Copy-Item {src} {dest}"

  open_browser:
    macos: 'open "{url}"'
    linux: 'xdg-open "{url}"'
    windows: 'Start-Process "{url}"'

  config_dir:
    macos_linux: "~/.config/"
    windows: "$env:APPDATA\\"

  home_dir:
    bash: "$HOME"
    powershell: "$env:USERPROFILE"

  python:
    macos_linux: "python3"
    windows: "python3 或 python（取決於安裝方式）"
    detection: |
      先嘗試 python3，若不存在再嘗試 python，
      確認版本 >= 3.8

  grep_pattern:
    description: "跨平台建議：改用 Python 處理"
    bash: "grep -E '{pattern}' {file}"
    powershell: "Select-String -Pattern '{pattern}' -Path {file}"
    python: "import re; re.search(pattern, text)"

  sed_replace:
    description: "跨平台建議：改用 Python 處理"
    bash: "sed -i 's/{old}/{new}/g' {file}"
    powershell: "(Get-Content {file}) -replace '{old}','{new}' | Set-Content {file}"
    python: "pathlib.Path(file).read_text().replace(old, new)"

skill_writing_rules:
  - 技能文件（.md）中的 shell 指令以 bash 為主寫法
  - Windows 不相容的指令必須附上 PowerShell 版本（雙代碼區塊）
  - 不相容指令清單：command -v、ENV=val cmd、mkdir -p、cp、open URL、uname、chmod、grep、sed、awk
  - 跨平台的指令不需要雙寫：git、node、npm、npx、python3、pip
  - 新建腳本一律用 Python 3，不用 bash
  - 既有 .sh 腳本逐步遷移為 .py（狀態見下方 migration_status）

# 腳本遷移狀態（2026-03-15 更新）
# completed = Python 版已完成，Shell 版保留作為備份
# active     = Shell 版仍在服役，尚未遷移
# shell-only = 必須保持 Shell（如 Git hook 薄層入口）
migration_status:
  setup/quick-start.sh:      { status: completed, python: setup/quick-start.py }
  setup/add-teacher.sh:      { status: completed, python: setup/add-teacher.py }
  setup/install-hooks.sh:    { status: completed, python: setup/install-hooks.py }
  setup/setup-check.sh:      { status: completed, python: setup/setup-check.py }
  setup/hooks/pre-commit:    { status: shell-only, note: "薄層入口 → setup/scripts/pre-commit-check.py" }
  setup/hooks/post-merge:    { status: shell-only, note: "薄層入口 → setup/scripts/post-merge-check.py" }
  setup/scripts/skill-platform-check.py: { status: completed, note: "技能跨平台檢查，opening Step 0 呼叫" }
  setup/save.sh:             { status: active, note: "wrap-up skill 已涵蓋此功能，低優先" }
  setup/start.sh:            { status: shell-only, note: "macOS/Linux 啟動器 → quick-start.py" }
  setup/start.ps1:           { status: shell-only, note: "Windows 啟動器 → quick-start.py" }
  publish/build.sh:          { status: completed, python: publish/build.py }

# Python 跨平台標準做法（2026-03-20 新增）
# Repo 所有 Python 檔案已遵循的 stdlib 標準，不需額外包裝模組。
python_patterns:
  paths: "pathlib.Path() — 不使用 os.path.join"
  temp_dir: "tempfile.mkdtemp() / tempfile.gettempdir() — 不使用 /tmp/"
  command_check: "shutil.which() — 不使用 command -v"
  home_dir: "Path.home() — 不使用 ~ 或 $HOME 字面量"
  subprocess: "subprocess.run([...], text=True) — 不使用 os.system()"
  repo_root: "git rev-parse --show-toplevel — 不使用硬編碼路徑"
  file_copy: "shutil.copy2() — 不使用 cp 指令"

# 定期維護（2026-03-20 新增）
maintenance:
  tool: "/check-compat（ai-core/skills/check-compat.md）"
  script: "setup/scripts/check-compat.py"
  frequency: "每月一次，或分享架構前"
  last_run: "2026-03-20"

hook_convention:
  description: "Git hooks 使用 shell 薄層呼叫 Python"
  example: |
    #!/bin/sh
    python3 "$(dirname "$0")/../../setup/scripts/pre-commit-check.py"

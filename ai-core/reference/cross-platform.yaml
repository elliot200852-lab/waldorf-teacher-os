# TeacherOS 跨平台指令公約
# AI agent 在執行技能時，依 OS 選用對應指令。
# 技能文件（.md）以 bash 為主寫法，Windows 不相容指令必須附 PowerShell 版。

platform_detection:
  bash: "uname -s"
  powershell: "$PSVersionTable.OS"

command_map:
  check_command:
    bash: "command -v {cmd}"
    powershell: "Get-Command {cmd} -ErrorAction SilentlyContinue"

  env_prefix:
    description: "設定環境變數後執行指令"
    bash: "VAR=value command"
    powershell: |
      $env:VAR = "value"
      command

  mkdir:
    bash: "mkdir -p {path}"
    powershell: "New-Item -ItemType Directory -Force -Path {path}"

  copy_file:
    bash: "cp {src} {dest}"
    powershell: "Copy-Item {src} {dest}"

  open_browser:
    macos: 'open "{url}"'
    linux: 'xdg-open "{url}"'
    windows: 'Start-Process "{url}"'

  config_dir:
    macos_linux: "~/.config/"
    windows: "$env:APPDATA\\"

  home_dir:
    bash: "$HOME"
    powershell: "$env:USERPROFILE"

  python:
    macos_linux: "python3"
    windows: "python3 或 python（取決於安裝方式）"
    detection: |
      先嘗試 python3，若不存在再嘗試 python，
      確認版本 >= 3.8

  grep_pattern:
    description: "跨平台建議：改用 Python 處理"
    bash: "grep -E '{pattern}' {file}"
    powershell: "Select-String -Pattern '{pattern}' -Path {file}"
    python: "import re; re.search(pattern, text)"

  sed_replace:
    description: "跨平台建議：改用 Python 處理"
    bash: "sed -i 's/{old}/{new}/g' {file}"
    powershell: "(Get-Content {file}) -replace '{old}','{new}' | Set-Content {file}"
    python: "pathlib.Path(file).read_text().replace(old, new)"

skill_writing_rules:
  - 技能文件（.md）中的 shell 指令以 bash 為主寫法
  - Windows 不相容的指令必須附上 PowerShell 版本（雙代碼區塊）
  - 不相容指令清單：command -v、ENV=val cmd、mkdir -p、cp、open URL、uname、chmod、grep、sed、awk
  - 跨平台的指令不需要雙寫：git、node、npm、npx、python3、pip
  - 新建腳本一律用 Python 3，不用 bash
  - 既有 .sh 腳本逐步遷移為 .py（狀態見下方 migration_status）

# 腳本遷移狀態（2026-04-17 更新）
# active     = Shell 版仍在服役，尚未遷移
# shell-only = 必須保持 Shell（如 Git hook 薄層入口、跨平台啟動器）
# removed    = 已從 repo 移除
migration_status:
  setup/quick-start.sh:      { status: removed, note: "v2.0 reclone 時刪除（含已失效的 GWS 部署 code），由 setup/start.sh → quick-start.py 取代" }
  setup/add-teacher.sh:      { status: removed, note: "2026-04-17 setup 清理時刪除；由 setup/add-teacher.py 取代" }
  setup/install-hooks.sh:    { status: removed, note: "2026-04-17 setup 清理時刪除；由 setup/install-hooks.py 取代" }
  setup/setup-check.sh:      { status: removed, note: "2026-04-17 setup 清理時刪除；由 setup/setup-check.py 取代" }
  setup/save.sh:             { status: removed, note: "2026-04-17 setup 清理時刪除；wrap-up skill 已完整取代此流程" }
  setup/add-logo.py:         { status: removed, note: "2026-04-17 setup 清理時刪除；publish/build.sh 已不再呼叫" }
  setup/gcal-write.py:       { status: removed, note: "2026-04-17 setup 清理時刪除；無技能呼叫" }
  setup/hooks/pre-commit:    { status: shell-only, note: "薄層入口 → setup/scripts/pre-commit-check.py" }
  setup/hooks/post-merge:    { status: shell-only, note: "薄層入口 → setup/scripts/post-merge-check.py" }
  setup/start.sh:            { status: shell-only, note: "macOS/Linux 啟動器 → quick-start.py" }
  setup/start.ps1:           { status: shell-only, note: "Windows 啟動器 → quick-start.py" }
  publish/build.sh:          { status: active, note: "Pandoc 發佈腳本，待遷移" }

hook_convention:
  description: "Git hooks 使用 shell 薄層呼叫 Python"
  example: |
    #!/bin/sh
    python3 "$(dirname "$0")/../../setup/scripts/pre-commit-check.py"

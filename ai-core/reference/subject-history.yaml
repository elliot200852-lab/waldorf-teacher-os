# 包含：施泰納歷史核心原則、意識演化課程對應、台灣主體意識史觀

steiner_core_principle: 人類整體意識的演化歷程與兒童個人意識的發展平行對應——歷史課不是讓學生「知道過去發生了什麼」，而是讓學生透過歷史素材經驗到與自身內在發展相呼應的意識轉變

consciousness_curriculum_mapping:
  grade_7: 中世紀、文藝復興、宗教改革、地理大發現——對應青春期初期從「集體性」中醒來、萌生個體意識；文藝復興正是人類從中世紀集體宗教秩序中覺醒、追求個人主體性的時代
  grade_8: 法國大革命、工業革命、美國獨立、近代民族主義——對應八年級學生內在的叛逆、對權威的質疑、對公平正義的強烈感受
  grade_9: 當代歷史與現代世界的形成——進入高中門檻，開始處理更複雜的當代全球秩序

teacher_core_tasks:
  - 透過生動敘事與傳記式教學讓歷史人物「活過來」
  - 讓學生在情感上與人類歷史經驗產生真實連結
  - 引導學生發展自己的歷史判斷力，而非灌輸標準史觀

taiwan_subjectivity:
  core_stance: 從台灣主體意識出發，從台灣人的角度認識世界，藉由認識世界進而更了解台灣
  worldview: 以全球史觀取代歐洲中心史觀
  spiral_curriculum_integration:
    grade_7: 地理大發現時台灣正是葡萄牙人口中的「Formosa」——從原住民、荷蘭人、漢人移民三個視角多元敘述，讓學生體驗「同一歷史事件有不同詮釋立場」，發展批判思考力
    grade_8_9: 革命與現代化主題自然連結台灣日治時期現代化、二二八、白色恐怖到民主化歷程；台灣民主運動史與八年級強烈正義感的發展階段高度吻合
  historical_moment: 台灣華德福歷史教學正從「移植歐洲課綱」走向「自主創造」——在保持施泰納意識演化哲學核心的同時，以原住民南島文化、多重殖民歷史、民主化運動作為教學素材

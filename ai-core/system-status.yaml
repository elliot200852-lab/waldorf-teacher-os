# 路徑：ai-core/system-status.yaml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 維護協議：
#   讀取 — AI 平時「不主動」讀取此檔。
#           以下情況才讀：
#             1. David 說「查狀態」、「現在系統在哪」
#             2. AI 需要跨班級比較現況
#             3. 新 AI 首次接手且 AI_HANDOFF.md 不足以定位
#   寫入 — 每次對話結束，AI「必須」更新有變動的欄位。
#           只改有變化的欄位，不重寫整份文件。
#   主要入口仍是 AI_HANDOFF.md，此文件是補充快照。
#
# 最後更新：2026-03-11

